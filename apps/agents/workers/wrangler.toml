name = "duyet-agents-api"
main = "src/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "agents-api.duyet.net/*", zone_name = "duyet.net" }
]

[observability]
enabled = true

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "duyet-agents-db"
database_id = "6d29934e-92cc-48ff-9149-8ddf6846fd43"

[durable_objects]
bindings = [
  { name = "ChatAgent", class_name = "ChatAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

[vars]
AI_GATEWAY = "monorepo"
AI_SEARCH_API_BASE = "https://84249c5c-c9b2-418d-8f03-ab3335997606.search.ai.cloudflare.com"
AI_SEARCH_SEARCH_ENDPOINT = "https://84249c5c-c9b2-418d-8f03-ab3335997606.search.ai.cloudflare.com/search"
AI_SEARCH_CHAT_COMPLETIONS_ENDPOINT = "https://84249c5c-c9b2-418d-8f03-ab3335997606.search.ai.cloudflare.com/chat/completions"
AI_SEARCH_ENDPOINT = "https://84249c5c-c9b2-418d-8f03-ab3335997606.search.ai.cloudflare.com/search"
# e.g. https://your-org.clerk.accounts.dev
CLERK_ISSUER_URL = ""
