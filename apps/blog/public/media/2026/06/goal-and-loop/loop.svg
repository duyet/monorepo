<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="760" height="460" fill="#f8f8f2"/>

  <!-- goal.md card -->
  <g>
    <rect x="40" y="150" width="180" height="160" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="130" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">goal.md</text>
    <line x1="64" y1="198" x2="196" y2="198" stroke="#1a1a1a" stroke-opacity="0.12" stroke-width="1"/>
    <text x="64" y="224" font-size="12" fill="#1a1a1a" fill-opacity="0.75">• the target</text>
    <text x="64" y="248" font-size="12" fill="#1a1a1a" fill-opacity="0.75">• the rules</text>
    <text x="64" y="272" font-size="12" fill="#1a1a1a" fill-opacity="0.75">• findings /</text>
    <text x="76" y="290" font-size="12" fill="#1a1a1a" fill-opacity="0.75">next steps</text>
  </g>

  <!-- feeds arrow -->
  <line x1="220" y1="230" x2="296" y2="230" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="258" y="220" text-anchor="middle" font-size="11" fill="#1a1a1a" fill-opacity="0.6">reads</text>

  <!-- loop ring -->
  <g>
    <circle cx="500" cy="230" r="150" fill="none" stroke="#1a1a1a" stroke-opacity="0.12" stroke-width="40"/>
    <!-- orange progress arc -->
    <path d="M 500 80 A 150 150 0 0 1 650 230" fill="none" stroke="#d97441" stroke-width="40" stroke-linecap="butt"/>

    <!-- nodes -->
    <g font-size="13" font-weight="600" fill="#1a1a1a">
      <circle cx="500" cy="80" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="500" y="84" text-anchor="middle">Plan</text>

      <circle cx="650" cy="230" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="650" y="234" text-anchor="middle">Act</text>

      <circle cx="500" cy="380" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="500" y="384" text-anchor="middle">Verify</text>

      <circle cx="350" cy="230" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="350" y="234" text-anchor="middle">Log</text>
    </g>

    <text x="500" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">the loop</text>
    <text x="500" y="246" text-anchor="middle" font-size="11" fill="#1a1a1a" fill-opacity="0.55">until goal met</text>
  </g>

  <!-- writes back arrow (Log -> goal.md) -->
  <path d="M 322 250 C 250 320, 150 330, 130 314" fill="none" stroke="#d97441" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowO)"/>
  <text x="225" y="345" text-anchor="middle" font-size="11" fill="#d97441">writes findings</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowO" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#d97441"/>
    </marker>
  </defs>
</svg>
