name: Deploy Preview to Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      cv: ${{ steps.filter.outputs.cv }}
      home: ${{ steps.filter.outputs.home }}
      homelab: ${{ steps.filter.outputs.homelab }}
      insights: ${{ steps.filter.outputs.insights }}
      llm-timeline: ${{ steps.filter.outputs.llm-timeline }}
      photos: ${{ steps.filter.outputs.photos }}
      agents: ${{ steps.filter.outputs.agents }}
      ai-percentage: ${{ steps.filter.outputs.ai-percentage }}
      packages: ${{ steps.filter.outputs.packages }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            blog:
              - 'apps/blog/**'
            cv:
              - 'apps/cv/**'
            home:
              - 'apps/home/**'
            homelab:
              - 'apps/homelab/**'
            insights:
              - 'apps/insights/**'
            llm-timeline:
              - 'apps/llm-timeline/**'
            photos:
              - 'apps/photos/**'
            agents:
              - 'apps/agents/**'
            ai-percentage:
              - 'apps/ai-percentage/**'
            packages:
              - 'packages/**'

      - name: Set deployment matrix
        id: set-matrix
        run: |
          APPS=()
          PACKAGES_CHANGED="${{ steps.filter.outputs.packages }}"

          if [[ "${{ steps.filter.outputs.blog }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"blog","project":"duyet-blog","domain":"blog.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.cv }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"cv","project":"duyet-cv","domain":"cv.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.home }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"home","project":"duyet-home","domain":"duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.homelab }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"homelab","project":"duyet-homelab","domain":"homelab.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.insights }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"insights","project":"duyet-insights","domain":"insights.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.photos }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"photos","project":"duyet-photos","domain":"photos.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.llm-timeline }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"llm-timeline","project":"duyet-llm-timeline","domain":"llm-timeline.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.agents }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"agents","project":"duyet-agents","domain":"agents.duyet.net"}')
          fi
          if [[ "${{ steps.filter.outputs.ai-percentage }}" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
            APPS+=('{"app":"ai-percentage","project":"duyet-ai-percentage","domain":"ai-percentage.duyet.net"}')
          fi

          if [ ${#APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${APPS[*]}"
          fi

  deploy-preview:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Restore bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build app
        id: build
        run: |
          cd apps/${{ matrix.app }}
          bun run build
        env:
          NODE_ENV: production
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          # App-specific secrets (only used by apps that need them)
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # Clerk Authentication (blog app)
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Save build failure status
        if: failure() && steps.build.outcome == 'failure'
        run: |
          mkdir -p /tmp/deployments
          echo "build_failed" > /tmp/deployments/${{ matrix.app }}.txt

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        if: success()
        run: |
          cd apps/${{ matrix.app }}

          # Skip deploy if no static output directory exists
          if [ ! -d "dist" ]; then
            echo "No 'dist' directory found — Vite build may have failed."
            echo "Skipping Cloudflare Pages deploy for ${{ matrix.app }}."
            echo "url=skipped" >> $GITHUB_OUTPUT
            echo "branch=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get branch name, sanitize for CF Pages (replace / with -)
          BRANCH="${{ github.head_ref }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-28)

          # Deploy to preview branch
          OUTPUT=$(bunx wrangler pages deploy dist \
            --project-name=${{ matrix.project }} \
            --branch="$BRANCH_SLUG" \
            --commit-dirty=true 2>&1)

          echo "$OUTPUT"

          # Extract the deployment URL
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.'"${{ matrix.project }}"'\.pages\.dev' | head -1)

          if [ -z "$URL" ]; then
            URL="https://${BRANCH_SLUG}.${{ matrix.project }}.pages.dev"
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_SLUG" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save deployment info
        if: success() && steps.deploy.outputs.url != ''
        run: |
          mkdir -p /tmp/deployments
          echo "${{ steps.deploy.outputs.url }}" > /tmp/deployments/${{ matrix.app }}.txt

      - name: Upload deployment artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-${{ matrix.app }}
          path: /tmp/deployments/${{ matrix.app }}.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Health check
        if: success() && steps.deploy.outputs.url != '' && steps.deploy.outputs.url != 'skipped'
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Checking $DEPLOY_URL..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "$DEPLOY_URL"; then
              echo "✅ Health check passed for $DEPLOY_URL"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "⚠️ Health check timed out for $DEPLOY_URL (may still be deploying)"

  comment-pr:
    name: Comment deployment URLs
    needs: [detect-changes, deploy-preview]
    if: always() && needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - name: Download all deployment artifacts
        uses: actions/download-artifact@v8
        with:
          path: deployments
          pattern: deployment-*
          merge-multiple: true

      - name: Build comment body
        id: comment
        run: |
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OVERALL="${{ needs.deploy-preview.result }}"

          COMMENT="## 🚀 Preview Deployments\n\n"

          if [[ "$OVERALL" == "failure" ]]; then
            COMMENT+="⚠️ One or more deployments failed. [View build logs]($ACTIONS_URL)\n\n"
          fi

          COMMENT+="| App | Status | Preview URL |\n"
          COMMENT+="|-----|--------|-------------|\n"

          # Parse matrix to know which apps were in scope
          MATRIX='${{ needs.detect-changes.outputs.matrix }}'
          APPS=$(echo "$MATRIX" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data.get('include', []):
              print(item['app'])
          ")

          for APP in $APPS; do
            FILE="deployments/${APP}.txt"
            if [ -f "$FILE" ]; then
              CONTENT=$(cat "$FILE")
              if [[ "$CONTENT" == "build_failed" ]]; then
                COMMENT+="| **$APP** | ❌ Build failed | [View logs]($ACTIONS_URL) |\n"
              elif [[ "$CONTENT" == "skipped" ]]; then
                COMMENT+="| **$APP** | ⏭ Skipped (SSR) | — |\n"
              elif [[ "$CONTENT" == http* ]]; then
                COMMENT+="| **$APP** | ✅ Deployed | [$CONTENT]($CONTENT) |\n"
              else
                COMMENT+="| **$APP** | ⚠️ Unknown | [View logs]($ACTIONS_URL) |\n"
              fi
            else
              COMMENT+="| **$APP** | ❌ Build failed | [View logs]($ACTIONS_URL) |\n"
            fi
          done

          COMMENT+="\n---\n"
          COMMENT+="_Commit: \`${{ github.event.pull_request.head.sha }}\` · [GitHub Actions]($ACTIONS_URL)_"

          echo -e "$COMMENT" > comment.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: duyetbot
          body-includes: Preview Deployments

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.DUYETBOT_GITHUB_TOKEN }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
