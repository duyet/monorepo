<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img">
  <title>Many projects, one operator: a single agent-loop session starts in the top folder that holds every repo. One state file lists each project and its current state. The loop spawns a git worktree per project to improve or fix it, in sequence or in parallel, and writes the result back to the one state file. All projects share skills and kb from anyrouter.dev.</title>
  <rect width="900" height="540" fill="#f8f8f2"/>
  <text x="36" y="32" font-size="17" font-weight="700" fill="#1a1a1a">Many projects, one operator</text>
  <defs>
    <marker id="s1" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1a1a1a"/></marker>
    <marker id="s2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#d97441"/></marker>
  </defs>

  <!-- orchestrator: one session at the top folder -->
  <rect x="36" y="48" width="828" height="104" rx="12" fill="#ffffff" stroke="#d97441" stroke-width="1.5"/>
  <text x="54" y="74" font-size="14" font-weight="700" fill="#1a1a1a">agent-loop — one session over the whole folder</text>
  <rect x="54" y="86" width="430" height="26" rx="6" fill="#1a1a1a"/>
  <text x="66" y="104" font-size="12" font-family="ui-monospace, monospace" fill="#ffffff">cd ~/project &amp;&amp; /agent-loop:start</text>
  <text x="500" y="98" font-size="10.5" fill="#1a1a1a" fill-opacity="0.7">~/project holds every repo — start once, here</text>
  <text x="54" y="134" font-size="10.5" fill="#1a1a1a" fill-opacity="0.6">wakes on a schedule → reads the state file → works each project, in sequence or in parallel</text>

  <line x1="271" y1="152" x2="271" y2="174" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#s1)"/>

  <!-- single state file: every project + state -->
  <rect x="36" y="176" width="476" height="282" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="54" y="200" font-size="13" font-weight="700" fill="#1a1a1a">state.json — one file, every project</text>
  <text x="54" y="217" font-size="10" fill="#1a1a1a" fill-opacity="0.55">the single source of truth — not one file per repo</text>
  <g font-size="11.5" font-family="ui-monospace, monospace">
    <!-- rows -->
    <g>
      <text x="58" y="246" fill="#1a1a1a">agentstate</text><text x="250" y="246" fill="#1a1a1a" fill-opacity="0.6" font-family="Inter">✓ green · idle</text>
      <circle cx="494" cy="242" r="4" fill="#1a1a1a" fill-opacity="0.2"/>
    </g>
    <line x1="54" y1="258" x2="494" y2="258" stroke="#1a1a1a" stroke-opacity="0.08"/>
    <g>
      <text x="58" y="280" fill="#1a1a1a">build-agent</text><text x="250" y="280" fill="#1a1a1a" fill-opacity="0.8" font-family="Inter">2 PRs in flight</text>
      <circle cx="494" cy="276" r="4" fill="#d97441"/>
    </g>
    <line x1="54" y1="292" x2="494" y2="292" stroke="#1a1a1a" stroke-opacity="0.08"/>
    <g>
      <text x="58" y="314" fill="#1a1a1a">minh-hermes</text><text x="250" y="314" fill="#1a1a1a" fill-opacity="0.8" font-family="Inter">fixing a bug</text>
      <circle cx="494" cy="310" r="4" fill="#d97441"/>
    </g>
    <line x1="54" y1="326" x2="494" y2="326" stroke="#1a1a1a" stroke-opacity="0.08"/>
    <g>
      <text x="58" y="348" fill="#1a1a1a">monorepo</text><text x="250" y="348" fill="#1a1a1a" fill-opacity="0.8" font-family="Inter">reviewing PRs</text>
      <circle cx="494" cy="344" r="4" fill="#d97441"/>
    </g>
    <line x1="54" y1="360" x2="494" y2="360" stroke="#1a1a1a" stroke-opacity="0.08"/>
    <g>
      <text x="58" y="382" fill="#1a1a1a">chmonitor</text><text x="250" y="382" fill="#1a1a1a" fill-opacity="0.6" font-family="Inter">3 landed today</text>
      <circle cx="494" cy="378" r="4" fill="#1a1a1a" fill-opacity="0.2"/>
    </g>
    <line x1="54" y1="394" x2="494" y2="394" stroke="#1a1a1a" stroke-opacity="0.08"/>
    <g>
      <text x="58" y="416" fill="#1a1a1a" fill-opacity="0.6">… more</text><text x="250" y="416" fill="#1a1a1a" fill-opacity="0.45" font-family="Inter">queued</text>
    </g>
  </g>
  <text x="54" y="444" font-size="9.5" fill="#1a1a1a" fill-opacity="0.5">each row: project + where its loop is right now</text>

  <!-- spawn worktrees -->
  <path d="M 512 250 C 524 250, 524 250, 528 250" fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#s1)"/>
  <text x="558" y="244" font-size="10" fill="#1a1a1a" fill-opacity="0.6">spawns a git worktree per active project</text>

  <rect x="536" y="176" width="328" height="282" rx="12" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.18"/>
  <text x="552" y="200" font-size="12.5" font-weight="700" fill="#1a1a1a">git worktrees</text>
  <text x="552" y="216" font-size="10" fill="#1a1a1a" fill-opacity="0.55">one per project being worked · parallel or sequential</text>

  <!-- worktree mini cards -->
  <g>
    <g>
      <rect x="552" y="228" width="296" height="56" rx="8" fill="#ffffff" stroke="#d97441" stroke-width="1.2"/>
      <text x="564" y="247" font-size="11" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">wt/build-agent</text>
      <g font-size="9" text-anchor="middle" fill="#1a1a1a">
        <rect x="564" y="256" width="56" height="18" rx="9" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.25"/><text x="592" y="269">pick</text>
        <rect x="628" y="256" width="64" height="18" rx="9" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.25"/><text x="660" y="269">implement</text>
        <rect x="700" y="256" width="52" height="18" rx="9" fill="#d97441"/><text x="726" y="269" fill="#ffffff">verify</text>
        <rect x="760" y="256" width="44" height="18" rx="9" fill="#1a1a1a"/><text x="782" y="269" fill="#ffffff">ship</text>
      </g>
    </g>
    <g>
      <rect x="552" y="294" width="296" height="56" rx="8" fill="#ffffff" stroke="#d97441" stroke-width="1.2"/>
      <text x="564" y="313" font-size="11" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a">wt/minh-hermes</text>
      <g font-size="9" text-anchor="middle" fill="#1a1a1a">
        <rect x="564" y="322" width="56" height="18" rx="9" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.25"/><text x="592" y="335">pick</text>
        <rect x="628" y="322" width="64" height="18" rx="9" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.25"/><text x="660" y="335">implement</text>
        <rect x="700" y="322" width="52" height="18" rx="9" fill="#d97441"/><text x="726" y="335" fill="#ffffff">verify</text>
        <rect x="760" y="322" width="44" height="18" rx="9" fill="#1a1a1a"/><text x="782" y="335" fill="#ffffff">ship</text>
      </g>
    </g>
    <g>
      <rect x="552" y="360" width="296" height="56" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-opacity="0.3"/>
      <text x="564" y="379" font-size="11" font-weight="700" font-family="ui-monospace, monospace" fill="#1a1a1a" fill-opacity="0.6">wt/monorepo</text>
      <text x="564" y="399" font-size="9.5" fill="#1a1a1a" fill-opacity="0.5">next in the queue</text>
    </g>
  </g>
  <!-- worktrees write back to the one state file -->
  <path d="M 552 430 C 470 430, 470 430, 300 430" fill="none" stroke="#d97441" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#s2)"/>
  <text x="430" y="424" font-size="9.5" fill="#d97441" text-anchor="middle">each worktree updates the one state file</text>

  <!-- shared hub -->
  <rect x="36" y="478" width="828" height="48" rx="10" fill="#fbeee7" stroke="#d97441" stroke-width="1.3"/>
  <circle cx="64" cy="502" r="6" fill="#d97441"/>
  <text x="80" y="498" font-size="12" font-weight="700" fill="#1a1a1a">anyrouter.dev — shared skills + kb for every project</text>
  <text x="80" y="514" font-size="9.5" fill="#1a1a1a" fill-opacity="0.65">one hub so every worktree plans and verifies the same way</text>
</svg>
