name: Deploy Preview to Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'

      - name: Discover apps and detect changes
        id: set-matrix
        run: |
          # Dynamically discover all apps that have wrangler.toml and cf:deploy:prod script
          DEPLOYABLE_APPS=()
          for wrangler in apps/*/wrangler.toml; do
            app_dir=$(dirname "$wrangler")
            app_name=$(basename "$app_dir")
            pkg="$app_dir/package.json"
            if [ -f "$pkg" ] && grep -q '"cf:deploy:prod"' "$pkg"; then
              DEPLOYABLE_APPS+=("$app_name")
            fi
          done

          echo "Discovered deployable apps: ${DEPLOYABLE_APPS[*]}"

          # Check which apps have changes using git
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          PACKAGES_CHANGED="${{ steps.filter.outputs.packages }}"

          APPS=()
          for app in "${DEPLOYABLE_APPS[@]}"; do
            project=$(grep -oP 'name\s*=\s*"\K[^"]+' "apps/$app/wrangler.toml" | head -1)
            if [ "$app" = "home" ]; then
              domain="duyet.net"
            else
              domain="${app}.duyet.net"
            fi

            APP_CHANGED=false
            if echo "$CHANGED_FILES" | grep -q "^apps/$app/"; then
              APP_CHANGED=true
            fi

            if [[ "$APP_CHANGED" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
              APPS+=("{\"app\":\"$app\",\"project\":\"$project\",\"domain\":\"$domain\"}")
            fi
          done

          if [ ${#APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${APPS[*]}"
          fi

  deploy-preview:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build app
        id: build
        run: |
          cd apps/${{ matrix.app }}
          bun run build
        env:
          NODE_ENV: production
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Save build failure status
        if: failure() && steps.build.outcome == 'failure'
        run: |
          mkdir -p /tmp/deployments
          echo "build_failed" > /tmp/deployments/${{ matrix.app }}.txt

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        if: success()
        run: |
          cd apps/${{ matrix.app }}

          # Read output directory from wrangler.toml, default to "dist"
          OUTPUT_DIR=$(grep -oP 'pages_build_output_dir\s*=\s*"\K[^"]+' wrangler.toml 2>/dev/null || echo "dist")

          # Skip deploy if no static output directory exists
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "No '$OUTPUT_DIR' directory found — app may use server-side rendering."
            echo "Skipping Cloudflare Pages deploy for ${{ matrix.app }}."
            echo "url=skipped" >> $GITHUB_OUTPUT
            echo "branch=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get branch name, sanitize for CF Pages (replace / with -)
          BRANCH="${{ github.head_ref }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-28)

          # Deploy to preview branch
          OUTPUT=$(bunx wrangler pages deploy "$OUTPUT_DIR" \
            --project-name=${{ matrix.project }} \
            --branch="$BRANCH_SLUG" \
            --commit-dirty=true 2>&1)

          echo "$OUTPUT"

          # Extract the deployment URL
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.'"${{ matrix.project }}"'\.pages\.dev' | head -1)

          if [ -z "$URL" ]; then
            URL="https://${BRANCH_SLUG}.${{ matrix.project }}.pages.dev"
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_SLUG" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save deployment info
        if: success() && steps.deploy.outputs.url != ''
        run: |
          mkdir -p /tmp/deployments
          echo "${{ steps.deploy.outputs.url }}" > /tmp/deployments/${{ matrix.app }}.txt

      - name: Upload deployment artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-${{ matrix.app }}
          path: /tmp/deployments/${{ matrix.app }}.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Health check
        if: success() && steps.deploy.outputs.url != '' && steps.deploy.outputs.url != 'skipped'
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Checking $DEPLOY_URL..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "$DEPLOY_URL"; then
              echo "✅ Health check passed for $DEPLOY_URL"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "⚠️ Health check timed out for $DEPLOY_URL (may still be deploying)"

  comment-pr:
    name: Comment deployment URLs
    needs: [detect-changes, deploy-preview]
    if: always() && needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - name: Download all deployment artifacts
        uses: actions/download-artifact@v8
        with:
          path: deployments
          pattern: deployment-*
          merge-multiple: true

      - name: Build comment body
        id: comment
        run: |
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OVERALL="${{ needs.deploy-preview.result }}"

          COMMENT="## 🚀 Preview Deployments\n\n"

          if [[ "$OVERALL" == "failure" ]]; then
            COMMENT+="⚠️ One or more deployments failed. [View build logs]($ACTIONS_URL)\n\n"
          fi

          COMMENT+="| App | Status | Preview URL |\n"
          COMMENT+="|-----|--------|-------------|\n"

          # Parse matrix to know which apps were in scope
          MATRIX='${{ needs.detect-changes.outputs.matrix }}'
          APPS=$(echo "$MATRIX" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data.get('include', []):
              print(item['app'])
          ")

          for APP in $APPS; do
            FILE="deployments/${APP}.txt"
            if [ -f "$FILE" ]; then
              CONTENT=$(cat "$FILE")
              if [[ "$CONTENT" == "build_failed" ]]; then
                COMMENT+="| **$APP** | ❌ Build failed | [View logs]($ACTIONS_URL) |\n"
              elif [[ "$CONTENT" == "skipped" ]]; then
                COMMENT+="| **$APP** | ⏭ Skipped (SSR) | — |\n"
              elif [[ "$CONTENT" == http* ]]; then
                COMMENT+="| **$APP** | ✅ Deployed | [$CONTENT]($CONTENT) |\n"
              else
                COMMENT+="| **$APP** | ⚠️ Unknown | [View logs]($ACTIONS_URL) |\n"
              fi
            else
              COMMENT+="| **$APP** | ❌ Build failed | [View logs]($ACTIONS_URL) |\n"
            fi
          done

          COMMENT+="\n---\n"
          COMMENT+="_Commit: \`${{ github.event.pull_request.head.sha }}\` · [GitHub Actions]($ACTIONS_URL)_"

          echo -e "$COMMENT" > comment.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: duyetbot
          body-includes: Preview Deployments

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.DUYETBOT_GITHUB_TOKEN }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
