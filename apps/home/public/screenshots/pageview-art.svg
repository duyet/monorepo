      <circle cx="208" cy="118" r="8" fill="#fffef9" />
      <circle cx="324" cy="76" r="8" fill="#fffef9" />

      <rect x="440" y="54" width="274" height="206" rx="22" />
      <path d="M488 206V98M548 206v-56M608 206v-92M668 206v-34" />
      <path d="M488 82h176" />

