<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  <!-- Browser chrome -->
  <rect width="800" height="44" fill="#f0f0f0"/>
  <rect width="800" height="1" y="44" fill="#e0e0e0"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#28c840"/>
  <rect x="100" y="12" width="500" height="20" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="350" y="26" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">homelab.duyet.net</text>

  <!-- App content: light infra dashboard -->
  <rect x="0" y="44" width="800" height="456" fill="#f8fafc"/>

  <!-- Top nav -->
  <rect x="0" y="44" width="800" height="52" fill="#fff"/>
  <rect x="0" y="96" width="800" height="1" fill="#e2e8f0"/>
  <text x="24" y="65" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Homelab</text>
  <text x="24" y="80" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Infrastructure Monitoring</text>
  <!-- Status badge -->
  <rect x="680" y="58" width="100" height="22" rx="11" fill="#dcfce7"/>
  <circle cx="696" cy="69" r="4" fill="#16a34a"/>
  <text x="705" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#15803d">All Systems OK</text>

  <!-- Network topology / server cards grid -->
  <!-- Row 1 header -->
  <text x="24" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">COMPUTE NODES</text>

  <!-- Server card 1: Primary Node -->
  <rect x="24" y="122" width="230" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="24" y="122" width="230" height="4" rx-top-left="10" rx-top-right="10" fill="#3b82f6"/>
  <text x="40" y="148" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">node-01 (primary)</text>
  <circle cx="240" cy="140" r="5" fill="#10b981"/>
  <!-- CPU bar -->
  <text x="40" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">CPU</text>
  <rect x="68" y="158" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="68" y="158" width="102" height="8" rx="4" fill="#3b82f6"/>
  <text x="244" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">60%</text>
  <!-- RAM bar -->
  <text x="40" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">RAM</text>
  <rect x="68" y="176" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="68" y="176" width="136" height="8" rx="4" fill="#8b5cf6"/>
  <text x="244" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">80%</text>
  <!-- Disk bar -->
  <text x="40" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Disk</text>
  <rect x="68" y="194" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="68" y="194" width="68" height="8" rx="4" fill="#10b981"/>
  <text x="244" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">40%</text>
  <!-- Uptime -->
  <text x="40" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Uptime: 47d 12h</text>
  <text x="180" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#10b981">● running</text>

  <!-- Server card 2: Worker -->
  <rect x="268" y="122" width="230" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="268" y="122" width="230" height="4" rx-top-left="10" rx-top-right="10" fill="#10b981"/>
  <text x="284" y="148" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">node-02 (worker)</text>
  <circle cx="484" cy="140" r="5" fill="#10b981"/>
  <text x="284" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">CPU</text>
  <rect x="312" y="158" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="312" y="158" width="51" height="8" rx="4" fill="#3b82f6"/>
  <text x="488" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">30%</text>
  <text x="284" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">RAM</text>
  <rect x="312" y="176" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="312" y="176" width="85" height="8" rx="4" fill="#8b5cf6"/>
  <text x="488" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">50%</text>
  <text x="284" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Disk</text>
  <rect x="312" y="194" width="170" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="312" y="194" width="119" height="8" rx="4" fill="#10b981"/>
  <text x="488" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">70%</text>
  <text x="284" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Uptime: 47d 11h</text>
  <text x="424" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#10b981">● running</text>

  <!-- Server card 3: Storage -->
  <rect x="512" y="122" width="264" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="512" y="122" width="264" height="4" rx-top-left="10" rx-top-right="10" fill="#f59e0b"/>
  <text x="528" y="148" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f172a">nas-01 (storage)</text>
  <circle cx="762" cy="140" r="5" fill="#f59e0b"/>
  <text x="528" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">CPU</text>
  <rect x="556" y="158" width="200" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="556" y="158" width="20" height="8" rx="4" fill="#3b82f6"/>
  <text x="762" y="166" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">10%</text>
  <text x="528" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">RAM</text>
  <rect x="556" y="176" width="200" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="556" y="176" width="60" height="8" rx="4" fill="#8b5cf6"/>
  <text x="762" y="184" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">30%</text>
  <text x="528" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Disk</text>
  <rect x="556" y="194" width="200" height="8" rx="4" fill="#f1f5f9"/>
  <rect x="556" y="194" width="180" height="8" rx="4" fill="#f59e0b"/>
  <text x="762" y="202" font-family="system-ui,sans-serif" font-size="8" fill="#0f172a" text-anchor="end">90%</text>
  <text x="528" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Uptime: 120d 4h</text>
  <text x="700" y="228" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b">⚠ disk high</text>

  <!-- Services row -->
  <text x="24" y="264" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">SERVICES</text>

  <!-- Docker containers grid -->
  <!-- Row 1 -->
  <rect x="24" y="270" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="42" cy="295" r="5" fill="#10b981"/>
  <text x="56" y="291" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Prometheus</text>
  <text x="56" y="305" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:9090 · monitoring</text>

  <rect x="214" y="270" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="232" cy="295" r="5" fill="#10b981"/>
  <text x="246" y="291" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Grafana</text>
  <text x="246" y="305" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:3000 · dashboards</text>

  <rect x="404" y="270" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="422" cy="295" r="5" fill="#10b981"/>
  <text x="436" y="291" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Traefik</text>
  <text x="436" y="305" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:80/:443 · proxy</text>

  <rect x="594" y="270" width="182" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="612" cy="295" r="5" fill="#10b981"/>
  <text x="626" y="291" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">ClickHouse</text>
  <text x="626" y="305" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:8123 · database</text>

  <!-- Row 2 -->
  <rect x="24" y="330" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="42" cy="355" r="5" fill="#10b981"/>
  <text x="56" y="351" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">MinIO</text>
  <text x="56" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:9000 · object store</text>

  <rect x="214" y="330" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="232" cy="355" r="5" fill="#10b981"/>
  <text x="246" y="351" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Portainer</text>
  <text x="246" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:9443 · management</text>

  <rect x="404" y="330" width="180" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="422" cy="355" r="5" fill="#ef4444"/>
  <text x="436" y="351" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Vault</text>
  <text x="436" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#ef4444">:8200 · stopped</text>

  <rect x="594" y="330" width="182" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="612" cy="355" r="5" fill="#10b981"/>
  <text x="626" y="351" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0f172a">Redis</text>
  <text x="626" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">:6379 · cache</text>

  <!-- Network stats bar -->
  <rect x="24" y="396" width="752" height="72" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="416" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="600">NETWORK</text>
  <!-- Sparkline chart -->
  <polyline points="40,452 80,445 120,450 160,438 200,442 240,430 280,435 320,428 360,432 400,424 440,428 480,420 520,425 560,418 600,422 640,416 680,420 720,412 760,416" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <text x="760" y="460" font-family="system-ui,sans-serif" font-size="8" fill="#3b82f6" text-anchor="end">↑ 124 Mbps</text>
</svg>
