name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.npmrc'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (empty=auto-detect, "all"=all apps, or app name e.g. "blog")'
        required: false
        type: choice
        options:
          - ''
          - all
          - blog
          - cv
          - home
          - homelab
          - insights
          - llm-timeline
          - photos
          - ai-percentage
          - agent-ui
          - burns

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          fetch-depth: 2
          submodules: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            agent-ui:
              - 'apps/agent-ui/**'
            blog:
              - 'apps/blog/**'
            cv:
              - 'apps/cv/**'
            home:
              - 'apps/home/**'
            homelab:
              - 'apps/homelab/**'
            insights:
              - 'apps/insights/**'
            llm-timeline:
              - 'apps/llm-timeline/**'
            photos:
              - 'apps/photos/**'
            ai-percentage:
              - 'apps/ai-percentage/**'
            burns:
              - 'apps/burns/**'
            packages:
              - 'packages/**'

      - name: Set deployment matrix
        id: set-matrix
        run: |
          # App configurations
          declare -A APPS
          APPS[agent-ui]='{"app":"agent-ui","project":"duyet-agents","url":"https://agents.duyet.net"}'
          APPS[blog]='{"app":"blog","project":"duyet-blog","url":"https://blog.duyet.net"}'
          APPS[cv]='{"app":"cv","project":"duyet-cv","url":"https://cv.duyet.net"}'
          APPS[home]='{"app":"home","project":"duyet-home","url":"https://duyet.net"}'
          APPS[homelab]='{"app":"homelab","project":"duyet-homelab","url":"https://homelab.duyet.net"}'
          APPS[insights]='{"app":"insights","project":"duyet-insights","url":"https://insights.duyet.net"}'
          APPS[llm-timeline]='{"app":"llm-timeline","project":"duyet-llm-timeline","url":"https://llm-timeline.duyet.net"}'
          APPS[photos]='{"app":"photos","project":"duyet-photos","url":"https://photos.duyet.net"}'
          APPS[ai-percentage]='{"app":"ai-percentage","project":"duyet-ai-percentage","url":"https://ai-percentage.duyet.net"}'
          APPS[burns]='{"app":"burns","project":"duyet-burns","url":"https://duyet-burns.pages.dev"}'

          DEPLOY_APPS=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_APP="${{ github.event.inputs.app }}"
            if [[ "$INPUT_APP" == "all" ]]; then
              for app in agent-ui blog cv home homelab insights llm-timeline photos ai-percentage burns; do
                DEPLOY_APPS+=("${APPS[$app]}")
              done
            elif [[ -n "$INPUT_APP" ]]; then
              # Deploy a specific app by name
              if [[ -n "${APPS[$INPUT_APP]+isset}" ]]; then
                DEPLOY_APPS+=("${APPS[$INPUT_APP]}")
              fi
            fi
          else
            # Auto-detect changes
            PACKAGES_CHANGED="${{ steps.filter.outputs.packages }}"
            FILTER_OUTPUTS='${{ toJson(steps.filter.outputs) }}'

            for app in agent-ui blog cv home homelab insights llm-timeline photos ai-percentage burns; do
              APP_CHANGED=$(echo "$FILTER_OUTPUTS" | jq -r --arg app "$app" '.[$app]')
              if [[ "$APP_CHANGED" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
                DEPLOY_APPS+=("${APPS[$app]}")
              fi
            done
          fi

          # Build matrix JSON
          if [ ${#DEPLOY_APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${DEPLOY_APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${DEPLOY_APPS[*]}"
          fi

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run turbo check-types

  unittest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test
        env:
          NODE_ENV: test
          CI: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: [detect-changes, typecheck, unittest, lint]
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    environment:
      name: production
      url: ${{ matrix.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain (blog WASM markdown)
        if: matrix.app == 'blog'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        if: matrix.app == 'blog'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        if: matrix.app == 'blog'
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.15.0

      - name: Build WASM packages (markdown converter)
        if: matrix.app == 'blog'
        run: pnpm run wasm:build:release

      - name: Tailscale
        continue-on-error: true
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8  # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Test connectivity to ClickHouse
        if: matrix.app == 'photos' || matrix.app == 'insights'
        continue-on-error: true
        run: |
          echo "Testing connectivity to ClickHouse..."
          echo "  Host: $CLICKHOUSE_HOST"
          echo "  Port: ${CLICKHOUSE_PORT:-8123}"
          PORT="${CLICKHOUSE_PORT:-8123}"

          # Test ICMP
          if ping -c 1 -W 5 "$CLICKHOUSE_HOST" > /dev/null 2>&1; then
            echo "✓ ICMP ping OK"
          else
            echo "::warning::ICMP ping failed - Tailscale may not be connected"
            tailscale status --json | jq -r '.Peer[].TailscaleIPs[]' 2>/dev/null || true
            echo "Continuing build (will fall back to other providers)"
            exit 0
          fi

          # Test HTTP port
          if curl -sf --max-time 10 "http://${CLICKHOUSE_HOST}:${PORT}/ping" > /dev/null 2>&1; then
            echo "✓ ClickHouse HTTP port $PORT OK"
          else
            echo "✗ ClickHouse HTTP port $PORT unreachable, trying common ports..."
            for p in 8123 8443 9000 443; do
              if curl -sf --max-time 5 "http://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p"
              elif curl -sf --max-time 5 "https://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p (HTTPS)"
              else
                echo "  ✗ Port $p: no response"
              fi
            done
            echo "Continuing build anyway (will fall back to other providers)"
          fi
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd apps/${{ matrix.app }}
          pnpm run cf:deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production environment variables (Vite apps use VITE_ prefix)
          NODE_ENV: production
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AGENTS_API_URL: /
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          # App-specific secrets (only used by apps that need them)
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # Clerk Authentication (blog app)
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ matrix.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        continue-on-error: ${{ matrix.app == 'ai' }}
        run: |
          echo "Checking ${{ matrix.url }}..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "${{ matrix.url }}"; then
              echo "✅ Health check passed for ${{ matrix.url }}"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1
