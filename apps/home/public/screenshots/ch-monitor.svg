<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  <!-- Browser chrome -->
  <rect width="800" height="44" fill="#f0f0f0"/>
  <rect width="800" height="1" y="44" fill="#e0e0e0"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#28c840"/>
  <rect x="100" y="12" width="500" height="20" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="350" y="26" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">clickhouse-monitor.duyet.workers.dev</text>

  <!-- App content: light dashboard -->
  <rect x="0" y="44" width="800" height="456" fill="#f8f9fa"/>

  <!-- Sidebar -->
  <rect x="0" y="44" width="200" height="456" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Logo -->
  <rect x="16" y="60" width="28" height="28" rx="6" fill="#FFCC00"/>
  <text x="30" y="79" font-family="system-ui,sans-serif" font-size="14" fill="#000" text-anchor="middle" font-weight="700">CH</text>
  <text x="52" y="74" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#111">Monitor</text>
  <text x="52" y="86" font-family="system-ui,sans-serif" font-size="9" fill="#999">ClickHouse Dashboard</text>

  <!-- Sidebar nav -->
  <rect x="8" y="102" width="184" height="28" rx="6" fill="#fef3c7"/>
  <text x="24" y="121" font-family="system-ui,sans-serif" font-size="11" fill="#92400e" font-weight="500">● Overview</text>
  <text x="24" y="149" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">  Queries</text>
  <text x="24" y="169" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">  Tables</text>
  <text x="24" y="189" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">  Processes</text>
  <text x="24" y="209" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">  Merges</text>
  <text x="24" y="229" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">  Settings</text>

  <!-- Cluster info -->
  <rect x="8" y="260" width="184" height="64" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="16" y="278" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af" font-weight="600">CLUSTER</text>
  <text x="16" y="294" font-family="system-ui,sans-serif" font-size="11" fill="#111" font-weight="500">production-01</text>
  <circle cx="16" cy="308" r="4" fill="#10b981"/>
  <text x="26" y="312" font-family="system-ui,sans-serif" font-size="9" fill="#10b981">Healthy · v24.3</text>

  <!-- Main content -->
  <!-- Header -->
  <text x="220" y="72" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#111">Overview</text>
  <text x="220" y="88" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af">Last updated: 2 seconds ago</text>

  <!-- Metric cards -->
  <!-- Card 1: Queries/sec -->
  <rect x="220" y="100" width="132" height="72" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="234" y="120" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">QUERIES/SEC</text>
  <text x="234" y="148" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#111">1,247</text>
  <text x="234" y="164" font-family="system-ui,sans-serif" font-size="8" fill="#10b981">↑ +8.2%</text>

  <!-- Card 2: Active -->
  <rect x="362" y="100" width="132" height="72" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="376" y="120" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">ACTIVE QUERIES</text>
  <text x="376" y="148" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#111">34</text>
  <text x="376" y="164" font-family="system-ui,sans-serif" font-size="8" fill="#6b7280">running now</text>

  <!-- Card 3: Memory -->
  <rect x="504" y="100" width="132" height="72" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="518" y="120" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">MEMORY USAGE</text>
  <text x="518" y="148" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#111">68%</text>
  <!-- Mini progress bar -->
  <rect x="518" y="158" width="100" height="6" rx="3" fill="#f3f4f6"/>
  <rect x="518" y="158" width="68" height="6" rx="3" fill="#f59e0b"/>

  <!-- Card 4: Disk -->
  <rect x="646" y="100" width="134" height="72" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="660" y="120" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">DISK READ/S</text>
  <text x="660" y="148" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#111">4.2GB</text>
  <text x="660" y="164" font-family="system-ui,sans-serif" font-size="8" fill="#6b7280">/ 2.1GB write</text>

  <!-- Chart area -->
  <rect x="220" y="186" width="560" height="130" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="234" y="204" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#111">Query Throughput</text>
  <text x="234" y="216" font-family="system-ui,sans-serif" font-size="8" fill="#9ca3af">queries per second · last 30 minutes</text>
  <!-- Chart lines -->
  <polyline points="240,290 270,272 300,280 330,260 360,265 390,245 420,250 450,238 480,255 470,242 520,230 550,235 580,248 610,230 640,225 670,220 700,215 730,222 760,218" fill="none" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="240,300 270,295 300,298 330,290 360,292 390,285 420,288 450,280 480,285 510,278 540,282 570,275 600,280 630,270 660,268 690,264 720,270 750,265 780,260" fill="none" stroke="#e5e7eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Y axis labels -->
  <text x="228" y="235" font-family="system-ui,sans-serif" font-size="7" fill="#d1d5db" text-anchor="end">2k</text>
  <text x="228" y="265" font-family="system-ui,sans-serif" font-size="7" fill="#d1d5db" text-anchor="end">1k</text>
  <text x="228" y="295" font-family="system-ui,sans-serif" font-size="7" fill="#d1d5db" text-anchor="end">0</text>

  <!-- Recent queries table -->
  <rect x="220" y="328" width="560" height="140" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="234" y="346" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#111">Recent Queries</text>
  <!-- Table header -->
  <rect x="220" y="352" width="560" height="20" fill="#f9fafb"/>
  <text x="234" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#9ca3af" font-weight="600">QUERY</text>
  <text x="570" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#9ca3af" font-weight="600">DURATION</text>
  <text x="680" y="365" font-family="system-ui,sans-serif" font-size="8" fill="#9ca3af" font-weight="600">ROWS READ</text>
  <!-- Table rows -->
  <text x="234" y="385" font-family="monospace,system-ui" font-size="9" fill="#374151">SELECT * FROM events WHERE date >= today()-7</text>
  <text x="570" y="385" font-family="system-ui,sans-serif" font-size="9" fill="#374151">124ms</text>
  <text x="680" y="385" font-family="system-ui,sans-serif" font-size="9" fill="#374151">2.4M</text>
  <line x1="220" y1="393" x2="780" y2="393" stroke="#f3f4f6" stroke-width="1"/>
  <text x="234" y="407" font-family="monospace,system-ui" font-size="9" fill="#374151">SELECT count() FROM system.query_log</text>
  <text x="570" y="407" font-family="system-ui,sans-serif" font-size="9" fill="#374151">12ms</text>
  <text x="680" y="407" font-family="system-ui,sans-serif" font-size="9" fill="#374151">148K</text>
  <line x1="220" y1="415" x2="780" y2="415" stroke="#f3f4f6" stroke-width="1"/>
  <text x="234" y="429" font-family="monospace,system-ui" font-size="9" fill="#374151">OPTIMIZE TABLE metrics FINAL</text>
  <text x="570" y="429" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b">2.1s</text>
  <text x="680" y="429" font-family="system-ui,sans-serif" font-size="9" fill="#374151">89M</text>
  <line x1="220" y1="437" x2="780" y2="437" stroke="#f3f4f6" stroke-width="1"/>
  <text x="234" y="451" font-family="monospace,system-ui" font-size="9" fill="#374151">SELECT user_id, sum(views) FROM pageviews</text>
  <text x="570" y="451" font-family="system-ui,sans-serif" font-size="9" fill="#374151">56ms</text>
  <text x="680" y="451" font-family="system-ui,sans-serif" font-size="9" fill="#374151">12.1M</text>
</svg>
