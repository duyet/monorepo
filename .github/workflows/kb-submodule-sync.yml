name: Sync kb content submodule

# Keeps apps/kb/kb pinned to the latest duyet/kb@main. Git submodules pin a
# fixed commit by design, so this hourly job bumps the pointer and opens a PR
# (master is protected: signatures + PR-only). The actual build + deploy runs
# in a separate job when that PR merges and the pointer lands on master.

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - "apps/kb/kb"

concurrency:
  group: kb-submodule-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Bump kb submodule → open PR
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Fetch submodule over HTTPS (no SSH key in CI)
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Update submodule to latest main
        id: bump
        run: |
          git submodule update --remote --recursive apps/kb/kb
          if git diff --quiet apps/kb/kb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "kb submodule already at latest main — nothing to do"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git -C apps/kb/kb log -1 --oneline
          fi

      - name: Commit pointer bump and open/update PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config user.name "duyetbot"
          git config user.email "duyetbot@users.noreply.github.com"
          new=$(git -C apps/kb/kb rev-parse --short HEAD)
          branch="bot/kb-submodule-sync"

          # Reset the bot branch to current master so the PR is always a single
          # clean commit (force-push is fine — only this bot writes to it).
          git checkout -B "$branch"
          git add apps/kb/kb
          git commit -m "chore(kb): sync content submodule to duyet/kb@${new}"
          git push --force origin "$branch"

          body=$(cat <<'EOF'
          Bumps `apps/kb/kb` to the latest [`duyet/kb@main`](https://github.com/duyet/kb).

          Auto-generated by the `Sync kb content submodule` workflow (hourly). Force-pushes to this branch each run, so the PR always reflects the newest pointer.

          Auto-merge is **not** armed — review and merge manually. (Arming `gh pr merge --auto --squash` would only land if the GITHUB_TOKEN satisfies master's branch protection, which it currently does not for signature checks.)

          Deploy of kb.duyet.net runs automatically in a separate job once this PR merges and the pointer lands on master.
          EOF
          )

          # Open the PR if it doesn't exist; otherwise the force-push already
          # updated the existing one (same branch).
          if ! gh pr view --repo "$GITHUB_REPOSITORY" --head "$branch" >/dev/null 2>&1; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base master \
              --head "$branch" \
              --title "chore(kb): sync content submodule" \
              --body "$body"
            # Label is best-effort — don't fail PR creation if it's missing.
            gh pr edit --repo "$GITHUB_REPOSITORY" --head "$branch" --add-label "chore" 2>/dev/null || true
          else
            echo "PR already open on $branch — force-push updated it."
          fi

  deploy:
    name: Deploy kb on pointer merge
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Fetch submodule over HTTPS (no SSH key in CI)
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy kb to Cloudflare Pages
        run: |
          cd apps/kb
          pnpm run cf:deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          NODE_ENV: production
          # Shared SiteHeader app-switcher links (baked at build time)
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null https://kb.duyet.net; then
              echo "✅ kb.duyet.net healthy"; exit 0
            fi
            echo "attempt $i failed, waiting 10s..."; sleep 10
          done
          echo "❌ health check failed"; exit 1
