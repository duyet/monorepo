name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (empty=auto-detect, "all"=all apps, or app name)'
        required: false
        type: string
        default: ''

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Discover deployable apps and detect changes
        id: set-matrix
        run: |
          # Dynamically discover all apps that have wrangler.toml (Cloudflare Pages apps)
          DEPLOYABLE_APPS=()
          for wrangler in apps/*/wrangler.toml; do
            app_dir=$(dirname "$wrangler")
            app_name=$(basename "$app_dir")

            # Skip Workers-only apps (they have their own deploy workflow)
            # Workers apps don't have an "out" build directory or cf:deploy:prod script
            pkg="$app_dir/package.json"
            if [ -f "$pkg" ] && grep -q '"cf:deploy:prod"' "$pkg"; then
              DEPLOYABLE_APPS+=("$app_name")
            fi
          done

          echo "Discovered deployable apps: ${DEPLOYABLE_APPS[*]}"

          # Build app config from wrangler.toml project names
          declare -A APP_CONFIGS
          for app in "${DEPLOYABLE_APPS[@]}"; do
            project=$(grep -oP 'name\s*=\s*"\K[^"]+' "apps/$app/wrangler.toml" | head -1)
            # Domain convention: <app>.duyet.net, except home -> duyet.net
            if [ "$app" = "home" ]; then
              domain="duyet.net"
            else
              domain="${app}.duyet.net"
            fi
            APP_CONFIGS[$app]="{\"app\":\"$app\",\"project\":\"$project\",\"url\":\"https://$domain\"}"
          done

          DEPLOY_APPS=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_APP="${{ github.event.inputs.app }}"
            if [[ "$INPUT_APP" == "all" || -z "$INPUT_APP" ]]; then
              for app in "${DEPLOYABLE_APPS[@]}"; do
                DEPLOY_APPS+=("${APP_CONFIGS[$app]}")
              done
            elif [[ -n "${APP_CONFIGS[$INPUT_APP]+isset}" ]]; then
              DEPLOY_APPS+=("${APP_CONFIGS[$INPUT_APP]}")
            else
              echo "::error::Unknown app: $INPUT_APP. Available: ${DEPLOYABLE_APPS[*]}"
              exit 1
            fi
          else
            # Auto-detect changes using git diff
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff-tree --no-commit-id --name-only -r HEAD)
            PACKAGES_CHANGED=false
            if echo "$CHANGED_FILES" | grep -q '^packages/'; then
              PACKAGES_CHANGED=true
            fi

            for app in "${DEPLOYABLE_APPS[@]}"; do
              APP_CHANGED=false
              if echo "$CHANGED_FILES" | grep -q "^apps/$app/"; then
                APP_CHANGED=true
              fi
              if [[ "$APP_CHANGED" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
                DEPLOY_APPS+=("${APP_CONFIGS[$app]}")
              fi
            done
          fi

          # Build matrix JSON
          if [ ${#DEPLOY_APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${DEPLOY_APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${DEPLOY_APPS[*]}"
          fi

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    environment:
      name: production
      url: ${{ matrix.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.app }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.app }}-

      - name: Install dependencies
        run: bun install

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Test connectivity to ClickHouse
        if: matrix.app == 'photos' || matrix.app == 'insights'
        run: |
          echo "Testing connectivity to ClickHouse..."
          echo "  Host: $CLICKHOUSE_HOST"
          echo "  Port: ${CLICKHOUSE_PORT:-8123}"
          PORT="${CLICKHOUSE_PORT:-8123}"

          # Test ICMP
          if ping -c 1 -W 5 "$CLICKHOUSE_HOST" > /dev/null 2>&1; then
            echo "✓ ICMP ping OK"
          else
            echo "✗ ICMP ping failed"
            tailscale status --json | jq -r '.Peer[].TailscaleIPs[]' 2>/dev/null || true
            exit 1
          fi

          # Test HTTP port
          if curl -sf --max-time 10 "http://${CLICKHOUSE_HOST}:${PORT}/ping" > /dev/null 2>&1; then
            echo "✓ ClickHouse HTTP port $PORT OK"
          else
            echo "✗ ClickHouse HTTP port $PORT unreachable, trying common ports..."
            for p in 8123 8443 9000 443; do
              if curl -sf --max-time 5 "http://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p"
              elif curl -sf --max-time 5 "https://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p (HTTPS)"
              else
                echo "  ✗ Port $p: no response"
              fi
            done
            echo "Continuing build anyway (will fall back to other providers)"
          fi
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd apps/${{ matrix.app }}
          bun run cf:deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production
          # Vite environment variables
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          # App-specific secrets
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CF_AIG_GATEWAY_ID: ${{ secrets.CF_AIG_GATEWAY_ID }}
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ matrix.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        continue-on-error: true
        run: |
          echo "Checking ${{ matrix.url }}..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "${{ matrix.url }}"; then
              echo "✅ Health check passed for ${{ matrix.url }}"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1
