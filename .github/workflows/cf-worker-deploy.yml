name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/agent-api/**'
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy'
        required: false
        type: choice
        options:
          - agents-api
          - duyet-api
          - all

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy-agents-api:
    name: Deploy duyet-agents-api Worker
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.worker == 'all' ||
      github.event.inputs.worker == 'agents-api'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$AGENT_API_TOKEN" ]; then
            echo "::error::Required secret AGENT_API_TOKEN is not set"
            missing=1
          fi
          if [ -z "$CLERK_JWT_KEY" ] && [ -z "$CLERK_SECRET_KEY" ]; then
            echo "::error::Either CLERK_JWT_KEY or CLERK_SECRET_KEY must be set"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Required secret CLOUDFLARE_API_TOKEN is not set"
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Required secret CLOUDFLARE_ACCOUNT_ID is not set"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required secrets are missing. Failing deployment."
            exit 1
          fi
          echo "All required secrets are present"
        env:
          AGENT_API_TOKEN: ${{ secrets.AGENT_API_TOKEN }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker to Cloudflare
        run: |
          cd apps/agent-api

          echo "Setting Worker secrets..."
          printf '%s' "$AGENT_API_TOKEN" | bunx wrangler@4.20.0 secret put AGENT_API_TOKEN
          if [ -n "$CLERK_JWT_KEY" ]; then
            printf '%s' "$CLERK_JWT_KEY" | bunx wrangler@4.20.0 secret put CLERK_JWT_KEY
          fi
          if [ -n "$CLERK_SECRET_KEY" ]; then
            printf '%s' "$CLERK_SECRET_KEY" | bunx wrangler@4.20.0 secret put CLERK_SECRET_KEY
          fi

          bun run deploy
        env:
          AGENT_API_TOKEN: ${{ secrets.AGENT_API_TOKEN }}
          CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed Worker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: duyet-agents-api" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: apps/agent-api/" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: AGENT_API_TOKEN and Clerk verification configured" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          # Get worker URL from wrangler
          WORKER_URL=$(bunx wrangler@4.20.0 deployments list --name duyet-agents-api --json 2>/dev/null | jq -r '.[0].url // empty')

          if [ -n "$WORKER_URL" ]; then
            echo "Checking $WORKER_URL/health..."
            max_attempts=3
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -s -f -o /dev/null "${WORKER_URL}/health"; then
                echo "✅ Worker health check passed"
                exit 0
              fi
              echo "Attempt $attempt/$max_attempts failed, waiting 5s..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "⚠️ Worker health check timed out"
          else
            echo "⚠️ Could not determine worker URL, skipping health check"
          fi
        working-directory: apps/agent-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-duyet-api:
    name: Deploy duyet-api Worker
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.worker == 'all' ||
      github.event.inputs.worker == 'duyet-api'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6  # v3  # v1  # v6.0.2
        with:
          submodules: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Cloudflare
        run: |
          cd apps/api
          bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed Worker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: duyet-api" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: apps/api/" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          # Get worker URL from wrangler
          WORKER_URL=$(bunx wrangler@4.20.0 deployments list --name duyet-api --json 2>/dev/null | jq -r '.[0].url // empty')

          if [ -n "$WORKER_URL" ]; then
            echo "Checking $WORKER_URL..."
            max_attempts=3
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -s -f -o /dev/null "$WORKER_URL"; then
                echo "✅ Worker health check passed"
                exit 0
              fi
              echo "Attempt $attempt/$max_attempts failed, waiting 5s..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "⚠️ Worker health check timed out"
          else
            echo "⚠️ Could not determine worker URL, skipping health check"
          fi
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
