name: Deploy Preview to Cloudflare Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set deployment matrix
        id: set-matrix
        run: |
          # Single source of truth: read app registry
          APPS_JSON=$(cat .github/cf-pages-apps.json)
          DEPLOY_APPS=()

          # Diff against PR base branch to catch all changes in the PR
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            2>/dev/null || git diff --name-only HEAD)
          PACKAGES_CHANGED=false
          echo "$CHANGED_FILES" | grep -q '^packages/' && PACKAGES_CHANGED=true

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "Packages changed: $PACKAGES_CHANGED"

          while IFS= read -r entry; do
            app=$(echo "$entry" | jq -r '.app')
            if echo "$CHANGED_FILES" | grep -q "^apps/$app/" || \
               [[ "$PACKAGES_CHANGED" == "true" ]]; then
              DEPLOY_APPS+=("$entry")
            fi
          done < <(echo "$APPS_JSON" | jq -c '.[]')

          if [ ${#DEPLOY_APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${DEPLOY_APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${DEPLOY_APPS[*]}"
          fi

  deploy-preview:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build app
        run: |
          cd apps/${{ matrix.app }}
          bun run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_DUYET_HOME_URL: https://duyet.net
          NEXT_PUBLIC_DUYET_BLOG_URL: https://blog.duyet.net
          NEXT_PUBLIC_DUYET_CV_URL: https://cv.duyet.net
          NEXT_PUBLIC_DUYET_INSIGHTS_URL: https://insights.duyet.net
          NEXT_PUBLIC_DUYET_PHOTOS_URL: https://photos.duyet.net
          NEXT_PUBLIC_DUYET_HOMELAB_URL: https://homelab.duyet.net
          # App-specific secrets (only used by apps that need them)
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        run: |
          cd apps/${{ matrix.app }}

          # Skip deploy if no static output directory exists
          if [ ! -d "out" ]; then
            echo "No 'out' directory found — app likely uses server-side rendering."
            echo "Skipping Cloudflare Pages deploy for ${{ matrix.app }}."
            echo "url=skipped" >> $GITHUB_OUTPUT
            echo "branch=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get branch name, sanitize for CF Pages (replace / with -)
          BRANCH="${{ github.head_ref }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-28)

          # Deploy to preview branch
          OUTPUT=$(bunx wrangler pages deploy out \
            --project-name=${{ matrix.project }} \
            --branch="$BRANCH_SLUG" \
            --commit-dirty=true 2>&1)

          echo "$OUTPUT"

          # Extract the deployment URL
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.'"${{ matrix.project }}"'\.pages\.dev' | head -1)

          if [ -z "$URL" ]; then
            URL="https://${BRANCH_SLUG}.${{ matrix.project }}.pages.dev"
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_SLUG" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save deployment info
        run: |
          mkdir -p /tmp/deployments
          echo "${{ steps.deploy.outputs.url }}" > /tmp/deployments/${{ matrix.app }}.txt

      - name: Upload deployment URL
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ matrix.app }}
          path: /tmp/deployments/${{ matrix.app }}.txt
          retention-days: 1

      - name: Health check
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Checking $DEPLOY_URL..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "$DEPLOY_URL"; then
              echo "✅ Health check passed for $DEPLOY_URL"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "⚠️ Health check timed out for $DEPLOY_URL (may still be deploying)"

  comment-pr:
    name: Comment deployment URLs
    needs: [detect-changes, deploy-preview]
    if: always() && needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - name: Download all deployment artifacts
        uses: actions/download-artifact@v4
        with:
          path: deployments
          pattern: deployment-*
          merge-multiple: true

      - name: Build comment body
        id: comment
        run: |
          COMMENT="## 🚀 Preview Deployments\n\n"
          COMMENT+="| App | Preview URL |\n"
          COMMENT+="|-----|-------------|\n"

          for file in deployments/*.txt; do
            if [ -f "$file" ]; then
              APP=$(basename "$file" .txt)
              URL=$(cat "$file")
              COMMENT+="| **$APP** | [$URL]($URL) |\n"
            fi
          done

          COMMENT+="\n---\n"
          COMMENT+="_Deployed from commit ${{ github.event.pull_request.head.sha }}_"

          # Save to file for multiline handling
          echo -e "$COMMENT" > comment.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: duyetbot
          body-includes: Preview Deployments

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.DUYETBOT_GITHUB_TOKEN }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
