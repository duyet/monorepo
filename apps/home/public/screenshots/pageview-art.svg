      <path d="M874 202c38-34 72-16 108-52s72 2 124-54" />
      <circle cx="874" cy="202" r="8" fill="#fffef9" />
      <circle cx="982" cy="150" r="8" fill="#fffef9" />
      <circle cx="1106" cy="96" r="8" fill="#fffef9" />
