# Cloudflare Workers configuration
name = "duyet-api"
main = "dist/index.js"
compatibility_date = "2024-01-01"

# Environment variables (set via wrangler secret)
# OPENROUTER_API_KEY

# Route configuration for production
routes = [
  { pattern = "api.duyet.net/*", zone_name = "duyet.net" }
]

# Cloudflare Workers Cache: safe no-op. This is a dynamic Hono API; responses
# set no `Cache-Control: public`, so nothing is cached. `Authorization`-bearing
# requests auto-bypass. Left enabled so any genuinely public GET endpoint can
# opt in later purely via response headers.
[cache]
enabled = true

# Build configuration
[build]
command = ""

# Development configuration
[dev]
port = 8787
local_protocol = "http"
