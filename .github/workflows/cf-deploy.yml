name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (empty=auto-detect, "all"=all apps, or app name e.g. "blog")'
        required: false
        type: choice
        options:
          - ''
          - all
          - blog
          - cv
          - home
          - homelab
          - insights
          - llm-timeline
          - photos
          - agents
          - ai-percentage

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  deployments: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            blog:
              - 'apps/blog/**'
            cv:
              - 'apps/cv/**'
            home:
              - 'apps/home/**'
            homelab:
              - 'apps/homelab/**'
            insights:
              - 'apps/insights/**'
            llm-timeline:
              - 'apps/llm-timeline/**'
            photos:
              - 'apps/photos/**'
            agents:
              - 'apps/agents/**'
            ai-percentage:
              - 'apps/ai-percentage/**'
            packages:
              - 'packages/**'

      - name: Set deployment matrix
        id: set-matrix
        run: |
          # App configurations
          declare -A APPS
          APPS[blog]='{"app":"blog","project":"duyet-blog","url":"https://blog.duyet.net"}'
          APPS[cv]='{"app":"cv","project":"duyet-cv","url":"https://cv.duyet.net"}'
          APPS[home]='{"app":"home","project":"duyet-home","url":"https://duyet.net"}'
          APPS[homelab]='{"app":"homelab","project":"duyet-homelab","url":"https://homelab.duyet.net"}'
          APPS[insights]='{"app":"insights","project":"duyet-insights","url":"https://insights.duyet.net"}'
          APPS[llm-timeline]='{"app":"llm-timeline","project":"duyet-llm-timeline","url":"https://llm-timeline.duyet.net"}'
          APPS[photos]='{"app":"photos","project":"duyet-photos","url":"https://photos.duyet.net"}'
          APPS[agents]='{"app":"agents","project":"duyet-agents","url":"https://agents.duyet.net"}'
          APPS[ai-percentage]='{"app":"ai-percentage","project":"duyet-ai-percentage","url":"https://ai-percentage.duyet.net"}'

          DEPLOY_APPS=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_APP="${{ github.event.inputs.app }}"
            if [[ "$INPUT_APP" == "all" ]]; then
              for app in blog cv home homelab insights llm-timeline photos agents ai-percentage; do
                DEPLOY_APPS+=("${APPS[$app]}")
              done
            elif [[ -n "$INPUT_APP" ]]; then
              # Deploy a specific app by name
              if [[ -n "${APPS[$INPUT_APP]+isset}" ]]; then
                DEPLOY_APPS+=("${APPS[$INPUT_APP]}")
              fi
            fi
          else
            # Auto-detect changes
            PACKAGES_CHANGED="${{ steps.filter.outputs.packages }}"
            FILTER_OUTPUTS='${{ toJson(steps.filter.outputs) }}'

            for app in blog cv home homelab insights llm-timeline photos agents ai-percentage; do
              APP_CHANGED=$(echo "$FILTER_OUTPUTS" | jq -r --arg app "$app" '.[$app]')
              if [[ "$APP_CHANGED" == "true" ]] || [[ "$PACKAGES_CHANGED" == "true" ]]; then
                DEPLOY_APPS+=("${APPS[$app]}")
              fi
            done
          fi

          # Build matrix JSON
          if [ ${#DEPLOY_APPS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No apps to deploy"
          else
            MATRIX=$(printf '%s,' "${DEPLOY_APPS[@]}" | sed 's/,$//')
            echo "matrix={\"include\":[$MATRIX]}" >> $GITHUB_OUTPUT
            echo "Apps to deploy: ${DEPLOY_APPS[*]}"
          fi

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    environment:
      name: production
      url: ${{ matrix.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.app }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.app }}-

      - name: Install dependencies
        run: bun install

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Debug environment variables
        run: |
          echo "### Environment Variables Debug" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### ClickHouse Configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:+SET (${#CLICKHOUSE_HOST} chars)}${CLICKHOUSE_HOST:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- CLICKHOUSE_USER: ${CLICKHOUSE_USER:+SET (${#CLICKHOUSE_USER} chars)}${CLICKHOUSE_USER:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- CLICKHOUSE_AUTH: ${CLICKHOUSE_PASSWORD:+SET (${#CLICKHOUSE_PASSWORD} chars)}${CLICKHOUSE_PASSWORD:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:+SET (${#CLICKHOUSE_DATABASE} chars)}${CLICKHOUSE_DATABASE:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Other API Keys:" >> $GITHUB_STEP_SUMMARY
          echo "- GITHUB_TOKEN: ${GITHUB_TOKEN:+SET}${GITHUB_TOKEN:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- WAKATIME_API_KEY: ${WAKATIME_API_KEY:+SET}${WAKATIME_API_KEY:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "- POSTHOG_API_KEY: ${POSTHOG_API_KEY:+SET}${POSTHOG_API_KEY:-NOT SET}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Build Environment:" >> $GITHUB_STEP_SUMMARY
          echo "- NODE_ENV: $NODE_ENV" >> $GITHUB_STEP_SUMMARY
          echo "- App: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY

          # Also print to logs for debugging
          echo "=== ClickHouse Environment Check ==="
          echo "CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:+SET (${#CLICKHOUSE_HOST} chars)}${CLICKHOUSE_HOST:-NOT SET}"
          echo "CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-NOT SET}"
          echo "CLICKHOUSE_USER: ${CLICKHOUSE_USER:+SET (${#CLICKHOUSE_USER} chars)}${CLICKHOUSE_USER:-NOT SET}"
          echo "CLICKHOUSE_AUTH: ${CLICKHOUSE_PASSWORD:+SET (${#CLICKHOUSE_PASSWORD} chars)}${CLICKHOUSE_PASSWORD:-NOT SET}"
          echo "CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:+SET (${#CLICKHOUSE_DATABASE} chars)}${CLICKHOUSE_DATABASE:-NOT SET}"
          echo "==================================="
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          NODE_ENV: production

      - name: Test connectivity to ClickHouse
        if: matrix.app == 'photos' || matrix.app == 'insights'
        run: |
          echo "Testing connectivity to ClickHouse..."
          echo "  Host: $CLICKHOUSE_HOST"
          echo "  Port: ${CLICKHOUSE_PORT:-8123}"
          PORT="${CLICKHOUSE_PORT:-8123}"

          # Test ICMP
          if ping -c 1 -W 5 "$CLICKHOUSE_HOST" > /dev/null 2>&1; then
            echo "✓ ICMP ping OK"
          else
            echo "✗ ICMP ping failed"
            tailscale status --json | jq -r '.Peer[].TailscaleIPs[]' 2>/dev/null || true
            exit 1
          fi

          # Test HTTP port
          if curl -sf --max-time 10 "http://${CLICKHOUSE_HOST}:${PORT}/ping" > /dev/null 2>&1; then
            echo "✓ ClickHouse HTTP port $PORT OK"
          else
            echo "✗ ClickHouse HTTP port $PORT unreachable, trying common ports..."
            for p in 8123 8443 9000 443; do
              if curl -sf --max-time 5 "http://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p"
              elif curl -sf --max-time 5 "https://${CLICKHOUSE_HOST}:${p}/ping" > /dev/null 2>&1; then
                echo "  ✓ Found ClickHouse on port $p (HTTPS)"
              else
                echo "  ✗ Port $p: no response"
              fi
            done
            echo "Continuing build anyway (will fall back to other providers)"
          fi
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd apps/${{ matrix.app }}
          bun run cf:deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production environment variables (Vite apps use VITE_ prefix)
          NODE_ENV: production
          VITE_DUYET_HOME_URL: https://duyet.net
          VITE_DUYET_BLOG_URL: https://blog.duyet.net
          VITE_DUYET_CV_URL: https://cv.duyet.net
          VITE_DUYET_INSIGHTS_URL: https://insights.duyet.net
          VITE_DUYET_PHOTOS_URL: https://photos.duyet.net
          VITE_DUYET_HOMELAB_URL: https://homelab.duyet.net
          VITE_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          VITE_DUYET_AGENTS_URL: https://agents.duyet.net
          VITE_DUYET_AI_URL: https://ai.duyet.net
          VITE_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          # Keep NEXT_PUBLIC_ for backward compat during migration
          NEXT_PUBLIC_DUYET_HOME_URL: https://duyet.net
          NEXT_PUBLIC_DUYET_BLOG_URL: https://blog.duyet.net
          NEXT_PUBLIC_DUYET_CV_URL: https://cv.duyet.net
          NEXT_PUBLIC_DUYET_INSIGHTS_URL: https://insights.duyet.net
          NEXT_PUBLIC_DUYET_PHOTOS_URL: https://photos.duyet.net
          NEXT_PUBLIC_DUYET_HOMELAB_URL: https://homelab.duyet.net
          NEXT_PUBLIC_DUYET_LLM_TIMELINE_URL: https://llm-timeline.duyet.net
          NEXT_PUBLIC_DUYET_AGENTS_URL: https://agents.duyet.net
          NEXT_PUBLIC_DUYET_AI_URL: https://ai.duyet.net
          NEXT_PUBLIC_DUYET_AI_PERCENTAGE_URL: https://ai-percentage.duyet.net
          # App-specific secrets (only used by apps that need them)
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ vars.CLICKHOUSE_PORT }}
          CLICKHOUSE_USER: ${{ vars.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ vars.CLICKHOUSE_DATABASE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          UNSPLASH_USERNAME: ${{ vars.UNSPLASH_USERNAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # Clerk Authentication (blog app)
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Cloudflare AI Gateway (agents app)
          CF_AIG_GATEWAY_ID: ${{ secrets.CF_AIG_GATEWAY_ID }}
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ matrix.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ matrix.project }}" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        continue-on-error: ${{ matrix.app == 'ai' }}
        run: |
          echo "Checking ${{ matrix.url }}..."
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -s -f -o /dev/null "${{ matrix.url }}"; then
              echo "✅ Health check passed for ${{ matrix.url }}"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, waiting 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1
