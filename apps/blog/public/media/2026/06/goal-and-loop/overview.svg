<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img">
  <title>The harness: Cowork plans, Claude Code runs the agent loop and ships PRs; a Hermes agent drives Claude Code or opencode on a k8s sandbox and manages itself; GitHub Actions and multi-repo scaling sit alongside; shared skills and MCP live on anyrouter.dev</title>
  <rect width="860" height="520" fill="#f8f8f2"/>
  <text x="40" y="38" font-size="17" font-weight="700" fill="#1a1a1a">The harness</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1a1a1a"/></marker>
    <marker id="aho" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#d97441"/></marker>
  </defs>

  <!-- core path: Cowork -> Claude Code -> Shipped -->
  <rect x="40" y="72" width="210" height="76" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="145" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Cowork</text>
  <text x="145" y="126" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.6">plan · prompts</text>

  <rect x="305" y="72" width="250" height="76" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="430" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Claude Code</text>
  <text x="430" y="126" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.6">agent loop · <tspan fill="#d97441" font-weight="700">verify</tspan></text>

  <rect x="610" y="72" width="210" height="76" rx="12" fill="#1a1a1a"/>
  <text x="715" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Shipped</text>
  <text x="715" y="126" text-anchor="middle" font-size="11.5" fill="#ffffff" fill-opacity="0.7">PRs · deploy</text>

  <line x1="250" y1="110" x2="303" y2="110" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="555" y1="110" x2="608" y2="110" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Hermes drives the loop (important, dotted) -->
  <rect x="305" y="230" width="250" height="92" rx="12" fill="#ffffff" stroke="#d97441" stroke-width="1.5"/>
  <text x="430" y="260" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Hermes agent</text>
  <text x="430" y="281" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.7">drives Claude Code / opencode</text>
  <text x="430" y="300" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.55">self-managing · k8s sandbox</text>
  <line x1="430" y1="230" x2="430" y2="150" stroke="#d97441" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aho)"/>

  <!-- generic side blocks, not connected -->
  <rect x="40" y="238" width="210" height="76" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="145" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">GitHub Actions</text>
  <text x="145" y="292" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.6">issue → fix</text>

  <rect x="610" y="238" width="210" height="76" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="715" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Scale</text>
  <text x="715" y="292" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.6">many repos</text>

  <!-- shared substrate -->
  <rect x="40" y="392" width="780" height="78" rx="12" fill="#fbeee7" stroke="#d97441" stroke-width="1.2"/>
  <text x="430" y="424" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">anyrouter.dev</text>
  <text x="430" y="446" text-anchor="middle" font-size="11.5" fill="#1a1a1a" fill-opacity="0.7">shared skills + MCP — used by every agent</text>
</svg>
