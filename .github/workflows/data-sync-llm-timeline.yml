name: Data Sync (LLM Timeline)

on:
  schedule:
    # Every Monday 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (preview without writing)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    name: Sync LLM model data from Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Sync data (dry run)
        if: ${{ inputs.dry_run == true }}
        working-directory: apps/llm-timeline
        run: bun scripts/sync-data.ts --dry-run --verbose

      - name: Sync data
        if: ${{ inputs.dry_run != true }}
        working-directory: apps/llm-timeline
        run: bun scripts/sync-data.ts

      - name: Create data sync pull request
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.DUYETBOT_GITHUB_TOKEN != '' && secrets.DUYETBOT_GITHUB_TOKEN || github.token }}
        run: |
          git add apps/llm-timeline/lib/data.ts

          if git diff --cached --quiet; then
            echo "No LLM timeline data changes detected."
            exit 0
          fi

          branch="chore/llm-timeline-data-sync"
          head="${{ github.repository_owner }}:$branch"
          pr_title="chore(llm-timeline): sync model data from Google Sheets + Epoch AI"
          pr_body="Automated LLM Timeline data sync from Google Sheets and Epoch AI."

          git config user.name "duyetbot"
          git config user.email "duyetbot@users.noreply.github.com"
          git switch "$branch" 2>/dev/null || git switch --create "$branch"
          git commit -m "$pr_title" \
            -m "Co-Authored-By: duyet <me@duyet.net>" \
            -m "Co-Authored-By: duyetbot <duyetbot@users.noreply.github.com>"
          git push --force-with-lease "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$branch"

          pr_number="$(gh pr list --head "$head" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "$pr_title" \
              --body "$pr_body"
          else
            gh pr create \
              --base "${{ github.ref_name }}" \
              --head "$head" \
              --title "$pr_title" \
              --body "$pr_body"
          fi
