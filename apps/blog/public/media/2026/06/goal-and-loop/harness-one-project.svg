<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Inter, ui-sans-serif, system-ui, sans-serif" role="img">
  <title>One project: Cowork plans and writes the whole plan tree into docs/ — vision.md, status.md, backlog.md and per-plan prd.md and plan.md. Claude Code's agent loop reads docs/ before work, runs pick-goal, spawn-subagents, implement, verify and log until done, ships scoped PRs and writes progress back to status.md. It reads and updates kb.duyet.net, rolls memory to long-term via DREAM.md, and pulls shared skills and kb from anyrouter.dev.</title>
  <rect width="900" height="600" fill="#f8f8f2"/>
  <text x="36" y="32" font-size="17" font-weight="700" fill="#1a1a1a">One project</text>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1a1a1a"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#d97441"/></marker>
  </defs>

  <!-- Cowork -->
  <rect x="36" y="50" width="400" height="84" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="52" y="74" font-size="14" font-weight="700" fill="#1a1a1a">Cowork — the planner</text>
  <text x="52" y="92" font-size="10.5" fill="#1a1a1a" fill-opacity="0.6">product vision · PRD · breaks the work into a plan tree</text>
  <text x="52" y="110" font-size="10.5" fill="#1a1a1a" fill-opacity="0.6">decides WHAT — then writes it all to docs/</text>

  <line x1="236" y1="134" x2="236" y2="162" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="246" y="153" font-size="10.5" fill="#1a1a1a" fill-opacity="0.6">writes the plan</text>

  <!-- docs/ plan tree -->
  <rect x="36" y="164" width="400" height="206" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="52" y="188" font-size="13" font-weight="700" fill="#1a1a1a">docs/ — the plan, written by Cowork</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <text x="54" y="212" fill="#1a1a1a">docs/</text>
    <text x="74" y="230" fill="#1a1a1a">vision.md</text><text x="250" y="230" fill="#1a1a1a" fill-opacity="0.5" font-family="Inter">north star</text>
    <text x="74" y="248" fill="#d97441">status.md</text><text x="250" y="248" fill="#1a1a1a" fill-opacity="0.5" font-family="Inter">the one progress board</text>
    <text x="74" y="266" fill="#1a1a1a">backlog.md</text><text x="250" y="266" fill="#1a1a1a" fill-opacity="0.5" font-family="Inter">prioritized queue</text>
    <text x="74" y="284" fill="#1a1a1a">plans/&lt;name&gt;/</text>
    <text x="94" y="302" fill="#1a1a1a">prd.md</text><text x="250" y="302" fill="#1a1a1a" fill-opacity="0.5" font-family="Inter">what &amp; why</text>
    <text x="94" y="320" fill="#1a1a1a">plan.md</text><text x="250" y="320" fill="#1a1a1a" fill-opacity="0.5" font-family="Inter">how: sequenced tasks</text>
  </g>
  <rect x="54" y="332" width="364" height="28" rx="6" fill="#fbeee7" stroke="#d97441" stroke-width="1"/>
  <text x="68" y="350" font-size="10" fill="#1a1a1a" fill-opacity="0.8">one repo can hold many plans — each its own folder</text>

  <line x1="236" y1="370" x2="236" y2="398" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="246" y="389" font-size="10.5" fill="#1a1a1a" fill-opacity="0.6">loop reads before work</text>

  <!-- Claude Code loop -->
  <rect x="36" y="400" width="400" height="166" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="52" y="424" font-size="14" font-weight="700" fill="#1a1a1a">Claude Code — the agent loop</text>
  <text x="52" y="441" font-size="10.5" fill="#1a1a1a" fill-opacity="0.55">decides HOW — runs unattended until the plan is satisfied</text>
  <g font-size="10" text-anchor="middle" fill="#1a1a1a">
    <rect x="52" y="452" width="80" height="26" rx="13" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.3"/><text x="92" y="469">pick goal</text>
    <rect x="142" y="452" width="104" height="26" rx="13" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.3"/><text x="194" y="469">spawn subagents</text>
    <rect x="256" y="452" width="82" height="26" rx="13" fill="#f8f8f2" stroke="#1a1a1a" stroke-opacity="0.3"/><text x="297" y="469">implement</text>
    <rect x="348" y="452" width="70" height="26" rx="13" fill="#d97441"/><text x="383" y="469" fill="#ffffff" font-weight="600">verify</text>
  </g>
  <line x1="132" y1="465" x2="140" y2="465" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="246" y1="465" x2="254" y2="465" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="338" y1="465" x2="346" y2="465" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M 383 478 C 383 500, 92 500, 92 480" fill="none" stroke="#d97441" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ao)"/>
  <text x="237" y="510" font-size="10" fill="#d97441" text-anchor="middle">loop until satisfied · verify = clear pass/fail</text>
  <rect x="52" y="522" width="366" height="30" rx="6" fill="#1a1a1a"/>
  <text x="66" y="541" font-size="10.5" fill="#ffffff">ships scoped PRs (merged + deployed) · logs progress to status.md</text>

  <!-- logs-progress dotted arrow back up to status.md -->
  <path d="M 36 470 C 18 430, 18 300, 34 250" fill="none" stroke="#d97441" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ao)"/>
  <text x="14" y="360" font-size="9.5" fill="#d97441" transform="rotate(-90 14 360)" text-anchor="middle">logs progress</text>

  <!-- RIGHT column -->
  <rect x="460" y="50" width="404" height="92" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="476" y="74" font-size="13" font-weight="700" fill="#1a1a1a">kb.duyet.net — knowledge base</text>
  <text x="476" y="93" font-size="10" fill="#1a1a1a" fill-opacity="0.7">loop builds it, reads it before work, updates it after</text>
  <text x="476" y="108" font-size="10" fill="#1a1a1a" fill-opacity="0.7">— engineering memory, so passes compound</text>
  <text x="476" y="128" font-size="9.5" fill="#d97441">ask Claude to generate the kb tree first</text>

  <rect x="460" y="158" width="404" height="92" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="476" y="182" font-size="13" font-weight="700" fill="#1a1a1a">DREAM.md — long-term memory</text>
  <text x="476" y="201" font-size="10" fill="#1a1a1a" fill-opacity="0.7">rewrites the run's working memory into durable</text>
  <text x="476" y="216" font-size="10" fill="#1a1a1a" fill-opacity="0.7">long-term memory the next run loads first</text>
  <text x="476" y="236" font-size="9.5" fill="#1a1a1a" fill-opacity="0.5">working memory → long-term, automatically</text>

  <rect x="460" y="266" width="404" height="92" rx="12" fill="#fbeee7" stroke="#d97441" stroke-width="1.3"/>
  <circle cx="492" cy="294" r="7" fill="#d97441"/>
  <text x="510" y="290" font-size="13" font-weight="700" fill="#1a1a1a">anyrouter.dev — shared hub</text>
  <text x="476" y="314" font-size="10" fill="#1a1a1a" fill-opacity="0.7">central skills + kb every agent pulls from,</text>
  <text x="476" y="329" font-size="10" fill="#1a1a1a" fill-opacity="0.7">so Cowork and the loop plan and verify the same way</text>
  <text x="476" y="349" font-size="9.5" fill="#d97441">central skills · prompts · kb</text>

  <g stroke="#d97441" stroke-width="1.2" stroke-dasharray="4 3">
    <path d="M 460 104 C 446 200, 446 420, 436 450" fill="none"/>
    <path d="M 460 204 C 448 260, 448 430, 436 466" fill="none"/>
    <path d="M 460 312 C 450 360, 448 440, 436 482" fill="none"/>
  </g>
</svg>
