<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  <!-- Browser chrome -->
  <rect width="800" height="44" fill="#f0f0f0"/>
  <rect width="800" height="1" y="44" fill="#e0e0e0"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#28c840"/>
  <rect x="100" y="12" width="500" height="20" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="350" y="26" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">llm-timeline.duyet.net</text>

  <!-- App content: dark sidebar + timeline -->
  <rect x="0" y="44" width="800" height="456" fill="#0f0f0f"/>

  <!-- Sidebar -->
  <rect x="0" y="44" width="200" height="456" fill="#1a1a1a"/>

  <!-- Sidebar title -->
  <text x="20" y="80" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#fff">LLM Timeline</text>
  <text x="20" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#888">50+ models · 2017–2025</text>

  <!-- Sidebar search -->
  <rect x="12" y="108" width="176" height="24" rx="6" fill="#2a2a2a"/>
  <text x="24" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#555">Search models...</text>

  <!-- Sidebar filter labels -->
  <text x="14" y="150" font-family="system-ui,sans-serif" font-size="9" fill="#666" font-weight="600" letter-spacing="0.5">FILTER BY</text>
  <!-- Filter chips -->
  <rect x="14" y="156" width="60" height="16" rx="8" fill="#6366f1" opacity="0.8"/>
  <text x="44" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">All</text>
  <rect x="80" y="156" width="60" height="16" rx="8" fill="#2a2a2a"/>
  <text x="110" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">Open</text>
  <rect x="146" y="156" width="44" height="16" rx="8" fill="#2a2a2a"/>
  <text x="168" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">Prop.</text>

  <!-- Org list -->
  <text x="14" y="195" font-family="system-ui,sans-serif" font-size="9" fill="#666" font-weight="600" letter-spacing="0.5">ORGANIZATION</text>
  <rect x="14" y="200" width="8" height="8" rx="2" fill="#3b82f6"/>
  <text x="28" y="208" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">OpenAI</text>
  <rect x="14" y="215" width="8" height="8" rx="2" fill="#8b5cf6"/>
  <text x="28" y="223" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">Google</text>
  <rect x="14" y="230" width="8" height="8" rx="2" fill="#10b981"/>
  <text x="28" y="238" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">Meta</text>
  <rect x="14" y="245" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="28" y="253" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">Anthropic</text>
  <rect x="14" y="260" width="8" height="8" rx="2" fill="#ef4444"/>
  <text x="28" y="268" font-family="system-ui,sans-serif" font-size="9" fill="#aaa">Mistral</text>

  <!-- Main timeline area -->
  <!-- Year labels -->
  <text x="230" y="70" font-family="system-ui,sans-serif" font-size="10" fill="#555" font-weight="600">2017</text>
  <text x="340" y="70" font-family="system-ui,sans-serif" font-size="10" fill="#555" font-weight="600">2019</text>
  <text x="450" y="70" font-family="system-ui,sans-serif" font-size="10" fill="#555" font-weight="600">2021</text>
  <text x="560" y="70" font-family="system-ui,sans-serif" font-size="10" fill="#555" font-weight="600">2023</text>
  <text x="670" y="70" font-family="system-ui,sans-serif" font-size="10" fill="#555" font-weight="600">2025</text>

  <!-- Timeline spine -->
  <line x1="220" y1="80" x2="780" y2="80" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Row 1: OpenAI models -->
  <text x="210" y="115" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">OpenAI</text>
  <line x1="220" y1="108" x2="780" y2="108" stroke="#1e1e1e" stroke-width="20" rx="4"/>
  <!-- GPT-2 -->
  <rect x="340" y="100" width="44" height="16" rx="8" fill="#3b82f6"/>
  <text x="362" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">GPT-2</text>
  <!-- GPT-3 -->
  <rect x="408" y="100" width="44" height="16" rx="8" fill="#3b82f6"/>
  <text x="430" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">GPT-3</text>
  <!-- GPT-4 -->
  <rect x="560" y="100" width="44" height="16" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="582" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">GPT-4</text>
  <!-- o1 -->
  <rect x="670" y="100" width="36" height="16" rx="8" fill="#3b82f6"/>
  <text x="688" y="112" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">o1</text>

  <!-- Row 2: Google -->
  <text x="210" y="143" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">Google</text>
  <line x1="220" y1="136" x2="780" y2="136" stroke="#1e1e1e" stroke-width="20" rx="4"/>
  <rect x="460" y="128" width="50" height="16" rx="8" fill="#8b5cf6"/>
  <text x="485" y="140" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">PaLM</text>
  <rect x="548" y="128" width="56" height="16" rx="8" fill="#8b5cf6"/>
  <text x="576" y="140" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Gemini</text>
  <rect x="660" y="128" width="72" height="16" rx="8" fill="#8b5cf6"/>
  <text x="696" y="140" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Gemini 2.0</text>

  <!-- Row 3: Meta -->
  <text x="210" y="171" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">Meta</text>
  <line x1="220" y1="164" x2="780" y2="164" stroke="#1e1e1e" stroke-width="20" rx="4"/>
  <rect x="540" y="156" width="56" height="16" rx="8" fill="#10b981"/>
  <text x="568" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">LLaMA 2</text>
  <rect x="640" y="156" width="56" height="16" rx="8" fill="#10b981"/>
  <text x="668" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">LLaMA 3</text>

  <!-- Row 4: Anthropic -->
  <text x="210" y="199" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">Anthropic</text>
  <line x1="220" y1="192" x2="780" y2="192" stroke="#1e1e1e" stroke-width="20" rx="4"/>
  <rect x="530" y="184" width="56" height="16" rx="8" fill="#f59e0b"/>
  <text x="558" y="196" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Claude 2</text>
  <rect x="635" y="184" width="70" height="16" rx="8" fill="#f59e0b"/>
  <text x="670" y="196" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Claude 3.5</text>

  <!-- Row 5: Mistral -->
  <text x="210" y="227" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">Mistral</text>
  <line x1="220" y1="220" x2="780" y2="220" stroke="#1e1e1e" stroke-width="20" rx="4"/>
  <rect x="570" y="212" width="70" height="16" rx="8" fill="#ef4444"/>
  <text x="605" y="224" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Mistral 7B</text>
  <rect x="660" y="212" width="70" height="16" rx="8" fill="#ef4444"/>
  <text x="695" y="224" font-family="system-ui,sans-serif" font-size="8" fill="#fff" text-anchor="middle">Mixtral</text>

  <!-- Stats row at bottom -->
  <rect x="220" y="430" width="120" height="44" rx="8" fill="#1a1a1a"/>
  <text x="280" y="450" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">50+</text>
  <text x="280" y="464" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">Models</text>
  <rect x="352" y="430" width="120" height="44" rx="8" fill="#1a1a1a"/>
  <text x="412" y="450" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">2017–2025</text>
  <text x="412" y="464" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">Date Range</text>
  <rect x="484" y="430" width="120" height="44" rx="8" fill="#1a1a1a"/>
  <text x="544" y="450" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">15+</text>
  <text x="544" y="464" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">Organizations</text>
</svg>
