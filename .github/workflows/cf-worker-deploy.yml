name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/agents/workers/**'
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy'
        required: false
        type: choice
        options:
          - agents-api
          - duyet-api
          - all

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy-agents-api:
    name: Deploy duyet-agents-api Worker
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.worker == 'all' ||
      github.event.inputs.worker == 'agents-api'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.AI_GATEWAY_TOKEN }}" ]; then
            echo "::error::Required secret AI_GATEWAY_TOKEN is not set"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Required secret CLOUDFLARE_API_TOKEN is not set"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Required secret CLOUDFLARE_ACCOUNT_ID is not set"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required secrets are missing. Failing deployment."
            exit 1
          fi
          echo "All required secrets are present"

      - name: Deploy Worker to Cloudflare
        run: |
          cd apps/agents/workers

          # Deploy the worker
          bunx wrangler deploy

          # Set AI Gateway token secret
          echo "Setting AI_GATEWAY_TOKEN secret..."
          echo "${{ secrets.AI_GATEWAY_TOKEN }}" | bunx wrangler secret put AI_GATEWAY_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed Worker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: duyet-agents-api" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: apps/agents/workers/" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: AI_GATEWAY_TOKEN configured" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          # Get worker URL from wrangler
          WORKER_URL=$(bunx wrangler deployments list --name duyet-agents-api --json 2>/dev/null | jq -r '.[0].url // empty')

          if [ -n "$WORKER_URL" ]; then
            echo "Checking $WORKER_URL/chat..."
            max_attempts=3
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -s -f -o /dev/null "${WORKER_URL}/chat"; then
                echo "✅ Worker health check passed"
                exit 0
              fi
              echo "Attempt $attempt/$max_attempts failed, waiting 5s..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "⚠️ Worker health check timed out"
          else
            echo "⚠️ Could not determine worker URL, skipping health check"
          fi
        working-directory: apps/agents/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-duyet-api:
    name: Deploy duyet-api Worker
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.worker == 'all' ||
      github.event.inputs.worker == 'duyet-api'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker to Cloudflare
        run: |
          cd apps/api
          bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed Worker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: duyet-api" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: apps/api/" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          # Get worker URL from wrangler
          WORKER_URL=$(bunx wrangler deployments list --name duyet-api --json 2>/dev/null | jq -r '.[0].url // empty')

          if [ -n "$WORKER_URL" ]; then
            echo "Checking $WORKER_URL..."
            max_attempts=3
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -s -f -o /dev/null "$WORKER_URL"; then
                echo "✅ Worker health check passed"
                exit 0
              fi
              echo "Attempt $attempt/$max_attempts failed, waiting 5s..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "⚠️ Worker health check timed out"
          else
            echo "⚠️ Could not determine worker URL, skipping health check"
          fi
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
