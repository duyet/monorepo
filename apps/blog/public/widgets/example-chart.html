<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob: https:; connect-src 'none';">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .chart-container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .chart-title {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .chart-canvas {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      gap: 8px;
      padding-top: 20px;
    }

    .bar {
      flex: 1;
      max-width: 60px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      border-radius: 6px 6px 0 0;
      transition: height 0.3s ease, transform 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .bar:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .bar-label {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }

    .bar-value {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 600;
      color: #1a1a1a;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .bar:hover .bar-value {
      opacity: 1;
    }

    .legend {
      margin-top: 20px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #666;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <h2 class="chart-title">Example Bar Chart</h2>
    <div class="chart-canvas" id="chart">
      <!-- Bars will be inserted by JavaScript -->
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-color"></div>
        <span>Sample Data</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Sample data
      const data = [
        { label: 'Jan', value: 65 },
        { label: 'Feb', value: 85 },
        { label: 'Mar', value: 45 },
        { label: 'Apr', value: 95 },
        { label: 'May', value: 75 },
        { label: 'Jun', value: 55 }
      ]

      const chart = document.getElementById('chart')
      const maxValue = Math.max(...data.map(d => d.value))

      // Render bars
      data.forEach(item => {
        const bar = document.createElement('div')
        bar.className = 'bar'
        const height = (item.value / maxValue) * 200
        bar.style.height = `${height}px`

        const label = document.createElement('div')
        label.className = 'bar-label'
        label.textContent = item.label

        const value = document.createElement('div')
        value.className = 'bar-value'
        value.textContent = item.value

        bar.appendChild(value)
        bar.appendChild(label)
        chart.appendChild(bar)
      })

      // REQUIRED: Height synchronization
      function reportHeight() {
        window.parent.postMessage({
          type: 'height',
          value: document.body.scrollHeight
        }, '*')
      }

      const ro = new ResizeObserver(() => reportHeight())
      ro.observe(document.body)
      reportHeight()

      window.widgetUpdate = reportHeight
    })()
  </script>
</body>
</html>
