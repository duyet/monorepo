name: Data Sync (LLM Timeline)

on:
  schedule:
    # Daily at 6am UTC to keep model data fresh
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (preview without writing)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    name: Sync LLM model data from Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7  # v3  # v1  # v6.0.2

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync data (dry run)
        if: ${{ inputs.dry_run == true }}
        working-directory: apps/llm-timeline
        run: pnpm exec tsx scripts/sync-data.ts --dry-run --verbose

      - name: Sync data
        if: ${{ inputs.dry_run != true }}
        working-directory: apps/llm-timeline
        run: pnpm exec tsx scripts/sync-data.ts

      - name: Commit and push data sync
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.DUYETBOT_GITHUB_TOKEN != '' && secrets.DUYETBOT_GITHUB_TOKEN || github.token }}
        run: |
          git add apps/llm-timeline/lib/data.ts

          if git diff --cached --quiet; then
            echo "No LLM timeline data changes detected."
            exit 0
          fi

          git config user.name "duyetbot"
          git config user.email "duyetbot@users.noreply.github.com"
          git commit -m "chore(llm-timeline): sync model data from Google Sheets + Epoch AI" \
            -m "Co-Authored-By: duyet <me@duyet.net>" \
            -m "Co-Authored-By: duyetbot <duyetbot@users.noreply.github.com>"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
