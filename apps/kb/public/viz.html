codebase-maintenance-loop__project-duyet-net", "source": "tech-codebase-maintenance-loop", "target": "project-duyet-net"}}, {"data": {"id": "tech-codebase-maintenance-loop__project-duyetbot", "source": "tech-codebase-maintenance-loop", "target": "project-duyetbot"}}, {"data": {"id": "tech-codebase-maintenance-loop__tech-cloudflare-pages-deploy", "source": "tech-codebase-maintenance-loop", "target": "tech-cloudflare-pages-deploy"}}, {"data": {"id": "tech-flat-design-system__project-duyet-net", "source": "tech-flat-design-system", "target": "project-duyet-net"}}, {"data": {"id": "tech-flat-design-system__project-llm-timeline", "source": "tech-flat-design-system", "target": "project-llm-timeline"}}, {"data": {"id": "tech-flat-design-system__tech-tanstack-start-ssg", "source": "tech-flat-design-system", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-hermes-agent-custom-provider__tech-ai-agent-stack", "source": "tech-hermes-agent-custom-provider", "target": "tech-ai-agent-stack"}}, {"data": {"id": "tech-kumo-ui-nextjs-integration__tech-flat-design-system", "source": "tech-kumo-ui-nextjs-integration", "target": "tech-flat-design-system"}}, {"data": {"id": "tech-kumo-ui-nextjs-integration__tech-tanstack-start-ssg", "source": "tech-kumo-ui-nextjs-integration", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-og-images-static-prerender__project-clickhouse-monitor", "source": "tech-og-images-static-prerender", "target": "project-clickhouse-monitor"}}, {"data": {"id": "tech-og-images-static-prerender__tech-tanstack-start-ssg", "source": "tech-og-images-static-prerender", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-okf-open-knowledge-format__feedback-docs-driven-development", "source": "tech-okf-open-knowledge-format", "target": "feedback-docs-driven-development"}}, {"data": {"id": "tech-okf-open-knowledge-format__project-kb-duyet-net", "source": "tech-okf-open-knowledge-format", "target": "project-kb-duyet-net"}}, {"data": {"id": "tech-okf-open-knowledge-format__tech-ai-agent-stack", "source": "tech-okf-open-knowledge-format", "target": "tech-ai-agent-stack"}}, {"data": {"id": "tech-release-please-squash-pipeline__tech-cloudflare-pages-deploy", "source": "tech-release-please-squash-pipeline", "target": "tech-cloudflare-pages-deploy"}}, {"data": {"id": "tech-release-please-squash-pipeline__tech-tanstack-start-ssg", "source": "tech-release-please-squash-pipeline", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-rust-wasm-prerender__project-duyet-net", "source": "tech-rust-wasm-prerender", "target": "project-duyet-net"}}, {"data": {"id": "tech-rust-wasm-prerender__tech-cloudflare-pages-deploy", "source": "tech-rust-wasm-prerender", "target": "tech-cloudflare-pages-deploy"}}, {"data": {"id": "tech-rust-wasm-prerender__tech-tanstack-start-ssg", "source": "tech-rust-wasm-prerender", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-rust-wasm-prerender__user-duyet-stack", "source": "tech-rust-wasm-prerender", "target": "user-duyet-stack"}}, {"data": {"id": "tech-supply-chain-pin-github-actions__tech-codebase-maintenance-loop", "source": "tech-supply-chain-pin-github-actions", "target": "tech-codebase-maintenance-loop"}}, {"data": {"id": "tech-supply-chain-pin-github-actions__tech-release-please-squash-pipeline", "source": "tech-supply-chain-pin-github-actions", "target": "tech-release-please-squash-pipeline"}}, {"data": {"id": "tech-tanstack-stale-route-chunks__project-anyrouter", "source": "tech-tanstack-stale-route-chunks", "target": "project-anyrouter"}}, {"data": {"id": "tech-tanstack-stale-route-chunks__tech-cloudflare-pages-deploy", "source": "tech-tanstack-stale-route-chunks", "target": "tech-cloudflare-pages-deploy"}}, {"data": {"id": "tech-tanstack-stale-route-chunks__tech-tanstack-start-ssg", "source": "tech-tanstack-stale-route-chunks", "target": "tech-tanstack-start-ssg"}}, {"data": {"id": "tech-tanstack-start-ssg__project-duyet-net", "source": "tech-tanstack-start-ssg", "target": "project-duyet-net"}}, {"data": {"id": "tech-tanstack-start-ssg__tech-cloudflare-pages-deploy", "source": "tech-tanstack-start-ssg", "target": "tech-cloudflare-pages-deploy"}}, {"data": {"id": "tech-tanstack-start-ssg__tech-rust-wasm-prerender", "source": "tech-tanstack-start-ssg", "target": "tech-rust-wasm-prerender"}}, {"data": {"id": "tech-traefik-forwardauth-oauth2-proxy__user-duyet-stack", "source": "tech-traefik-forwardauth-oauth2-proxy", "target": "user-duyet-stack"}}, {"data": {"id": "user-duyet-ai-stance__feedback-docs-driven-development", "source": "user-duyet-ai-stance", "target": "feedback-docs-driven-development"}}, {"data": {"id": "user-duyet-ai-stance__user-duyet-profile", "source": "user-duyet-ai-stance", "target": "user-duyet-profile"}}, {"data": {"id": "user-duyet-ai-stance__user-duyet-stack", "source": "user-duyet-ai-stance", "target": "user-duyet-stack"}}, {"data": {"id": "user-duyet-profile__feedback-working-style", "source": "user-duyet-profile", "target": "feedback-working-style"}}, {"data": {"id": "user-duyet-profile__user-duyet-stack", "source": "user-duyet-profile", "target": "user-duyet-stack"}}, {"data": {"id": "user-duyet-profile__user-duyet-web-presence", "source": "user-duyet-profile", "target": "user-duyet-web-presence"}}, {"data": {"id": "user-duyet-stack__user-duyet-profile", "source": "user-duyet-stack", "target": "user-duyet-profile"}}, {"data": {"id": "user-duyet-stack__user-duyet-web-presence", "source": "user-duyet-stack", "target": "user-duyet-web-presence"}}, {"data": {"id": "user-duyet-web-presence__user-duyet-profile", "source": "user-duyet-web-presence", "target": "user-duyet-profile"}}, {"data": {"id": "user-duyet-web-presence__user-duyet-stack", "source": "user-duyet-web-presence", "target": "user-duyet-stack"}}], "bodies": {"feedback-cheap-models-subagents": "When dispatching sub-agents (Agent tool) or Workflow agents \u2014 especially in\nbatch/parallel fan-out (e.g. babysitting/fixing/merging many PRs at once) \u2014\ndefault them to a **cheaper model** (`sonnet`, or `haiku` for trivial/mechanical\nwork) rather than inheriting Opus.\n\n**Why:** Opus across many concurrent agents is expensive and usually overkill for\nmechanical, well-scoped work (fix-CI-then-merge, search, refactor-to-spec). Duyet\nflagged cost during a 13-agent parallel PR batch.\n\n**How to apply:**\n- Pass `model: \"sonnet\"` on `Agent` calls; `opts.model` in Workflow scripts.\n- Use `haiku` for trivial/mechanical tasks; reserve **Opus** for genuinely complex\n  reasoning the main loop handles.\n- Don't restart already-running agents just to switch model \u2014 only apply to new\n  dispatches.", "feedback-docs-driven-development": "Duyet's core agent-collaboration pattern (from his blog, \"Docs-Driven Development\"):\n\n- **`CLAUDE.md`/`AGENTS.md` stays tiny** \u2014 short, stable rules + a router pointing\n  at the right doc. Cramming architecture/feature contracts in there rots the file.\n- **A versioned, grep-able `kb` is the brain** \u2014 structured by the question being\n  asked; the same docs serve Duyet, teammates, and every coding agent.\n- **Make read/write reflexive, phrased as triggers not requests:** read the index\n  on the way *in* (before answering anything non-trivial), write back on the way\n  *out* (before forgetting). \"Remember to write docs\" doesn't work \u2014 triggers do.\n\n**Why:** rules-in-prompt evaporate between sessions; a structured external brain\npersists and is reviewable in a PR.\n\n**How to apply:** this is exactly the model this repo implements \u2014 read `MEMORY.md`\nfirst, grep `memory/`, write durable facts back automatically. Don't bloat the\nrouter files; put knowledge in notes.", "feedback-working-style": "Working preferences for agents collaborating with [[user-duyet-profile]].\n\n- **Language:** respond in English. (Vietnamese is native, but English is the\n  default for work.)\n- **Communication:** concise, evidence over assumption, no filler words like\n  \"comprehensive/extensive\". Surface tradeoffs and uncertainty; don't hide confusion.\n- **Code:** simplest solution that works. No speculative abstractions, no\n  features beyond what was asked. Surgical changes \u2014 touch only what's needed.\n- **Commits:** semantic format, consistent scope, simple English.\n- **Autonomy:** comfortable with `/loop` for recurring maintenance; values\n  non-disruptive operations (never destructive actions without explicit ask).\n\n**Why:** Duyet is a senior engineer who optimizes for maintainability and low\nnoise; over-engineering and verbosity waste his time.\n\n**How to apply:** default to less code and fewer words; ask before big or\nirreversible moves; match the existing codebase's conventions.", "project-anyrouter": "github.com/duyet/anyrouter \u2014 OpenAI-compatible LLM router: one API, many providers, BYOK, presets, failover.\n\n## Stack & deploy\n\n| Layer | Choice |\n|-------|--------|\n| App | TanStack Start + React, SSR on Cloudflare Workers |\n| UI | Kumo (`@cloudflare/kumo`) + Phosphor icons |\n| API | Separate `anyrouter-api` worker via service binding (3 MiB budget split) |\n| Deploy | `pnpm cf:deploy` \u2192 `pnpm ops deploy` (secrets, D1 migrate, build, deploy, prerender, purge) |\n| Docs | Customer docs in `src/content/docs/`; maintainer kb in `docs/kb/` |\n\n## Public routes (2026-06-14)\n\n- `/pricing` \u2014 Free / Pro / Team tiers (Kumo cards)\n- Homepage **LLM API Gateway** diagram: `src/components/home-sections/gateway-section.tsx` (clients \u2192 AnyRouter hub \u2192 providers)\n- Subdomain shortcuts: `pricing.anyrouter.dev` \u2192 `/pricing`, etc. (`src/worker.ts`)\n\n## Ops habits\n\n- Post-task: deploy + commit only touched paths (`git add` specific files, never `-A`)\n- Smoke: `pnpm e2e:test:prod` after deploy\n- Internal kb auto-updated under `docs/kb/` for non-trivial fixes\n\n**Why:** Agents working across repos need the deploy split, file locations, and stale-chunk trap without re-discovering from scratch.\n\n**How to apply:** Read `docs/kb/` + `AGENTS.md` in repo before coding; use Kumo docs-first; route all upstreams through CF AI Gateway.", "project-clickhouse-monitor": "github.com/duyet/clickhouse-monitoring \u2014 flagship ClickHouse ops UI (~240\u2605, GPL-3.0).\n\n## Domains (Cloudflare Workers)\n\n| Worker | App | URL |\n|--------|-----|-----|\n| `chmonitor-landing` | `apps/landing` (Astro static) | chmonitor.dev |\n| `chmonitor-dash` | `apps/dashboard` (TanStack Start) | dash.chmonitor.dev |\n| `chmonitor-docs` | `apps/docs` (Astro custom theme) | docs.chmonitor.dev |\n| `chmonitor-mcp` | `apps/mcp` | dash.chmonitor.dev/api/mcp* |\n\nPR previews: `preview.chmonitor.dev`, `preview.docs.chmonitor.dev`, `preview.dash.chmonitor.dev`.\n\n`apps/landing` and `apps/docs` are **outside** the root bun workspace (isolated installs).\n\n## Marketing design system (2026-06-14)\n\nShared landing + docs vibe:\n- **Display:** Bricolage Grotesque \u00b7 **Body:** Source Sans 3 \u00b7 **Mono:** JetBrains Mono\n- **Palette:** zinc fg (`#09090b`), amber `#f59e0b` \u2192 orange `#f97316` accent\n- **CTA copy:** nav/buttons say **Dashboard** / **Open dashboard** (not \"Open Cloud\")\n- Landing hero: browser-frame dashboard carousel + stats strip + lazy-loaded gallery marquee\n\nDocs: custom Astro theme (not Starlight); Pagefind search; versioned via `scripts/sync-docs.mjs`.\n\n## CI gotcha\n\n`component-test` (Cypress) fails on main when no `src/**/*.cy.{ts,tsx}` specs exist \u2014 needs `supportFile: false` in `cypress.config.ts` component block or actual component specs.\n\n**Why:** Agents editing marketing/docs need the right app paths and shared tokens \u2014 not the dashboard TanStack app.\n\n**How to apply:** Landing/docs changes \u2192 `apps/landing` + `apps/docs` only; build with `bun run build:landing` and `cd apps/docs && bun run build`; deploy via `landing.yml` / `docs.yml` / `cloudflare.yml`.", "project-duyet-net": "`duyet/monorepo` \u2014 Bun + Turborepo hosting all of [[user-duyet-profile]]'s public\nweb apps + shared packages. Most apps are TanStack Start SSG on Cloudflare Pages\n(see [[tech-tanstack-start-ssg]], [[tech-cloudflare-pages-deploy]]).\n\n**Apps** (subdomains of duyet.net), with pre-rendered page counts:\n- `blog` (393) \u2014 TanStack Start SSG, WASM markdown, isomorphic `readPublicJson`.\n- `llm-timeline` (3700+) \u2014 see [[project-llm-timeline]].\n- `insights` (22) \u2014 AI/Claude usage analytics from CCUsage data.\n- `home` (4), `cv` (2), `photos` (2), `homelab` (1), `ai-percentage` (1).\n- `agents` \u2014 the **only** Vite SPA left; D1 Pages Functions block SSG. See [[project-duyetbot]].\n\n**Shared packages:** `components` (design system), `libs` (WASM bindings re-export),\n`wasm` (compiled Rust crates), `data-sync`, `api`, `config`, `urls`.\n\n**Design:** flat/hairline design system \u2014 see [[tech-flat-design-system]]. Palette\nvaries per app (blog white `#ffffff`, others warm cream `#fbf7f0`).\nWASM strategy: [[tech-rust-wasm-prerender]]. Maintained autonomously by [[project-duyetbot]].", "project-duyetbot": "duyetbot \u2014 the autonomous Claude Code agent persona that maintains [[project-duyet-net]].\n\n**Scope (can change without asking):** codebase, look-and-feel, deployment \u2014\nlayout, components, design tokens, deps, build/deploy config, landing-page copy.\n**Out of scope (needs human direction):** blog post content (`apps/blog/_posts/**`)\nand LLM Timeline curated data \u2014 those are Duyet's authored words/research facts.\n\n**Autonomous loop** (`/loop` or one-shot `claude -p`): measure \u2192 fix top-priority\nissue \u2192 verify (lint+test+build) \u2192 commit \u2192 background-deploy \u2192 log. Priority order:\nbuild > tests > lint > deploy > code quality > features. See [[tech-cloudflare-pages-deploy]].\n\n**Memory hierarchy** (most\u2192least durable): commit messages \u2192 kb articles \u2192 durable\nfindings doc \u2192 session memory `.md` snapshots \u2192 transcript. Memory files are\npoint-in-time, may be stale \u2014 verify against code before acting. This is the\n[[feedback-docs-driven-development]] model. Auto-compaction welcomed; save\nto-remember context before it. Commits add a duyetbot co-author trailer.", "project-infra-optimization": "# Infra Optimization Baseline (2026-06-13)\n\n**Goal**: optimize resources, reduce complexity, fix security issues on duet-ubuntu k3s cluster.\n\n## Results\n\n| Metric | Before | After | Delta |\n|--------|--------|-------|-------|\n| Memory | 10Gi (78%) | 9.2Gi (70%) | **-1.7Gi** |\n| Disk | 372G (86%) | 363G (84%) | **-9GB** |\n| Swap files | 2 (16G) | 1 (11G) | -4G file |\n| CrashLoop pods | 1 | 0 | fixed |\n| Services without limits | cert-manager | 0 | all limited |\n| Kubeconfig perms | 644 world-readable | 640/600 | secured |\n\n## What Changed\n\n### Resource optimization (all services)\n- Key principle: set requests based on actual usage, limits at 1.5-2x peak\n- Hermes: memory limit raised 1Gi \u2192 2Gi (was being exceeded at 1212Mi)\n- PeerDB: massive over-provisioning fixed \u2014 temporal 512\u2192128Mi, flow-worker 512\u2192128Mi, total req ~1.9Gi \u2192 736Mi\n- Home Assistant: CPU limit 2 \u2192 500m (only using 10m actual)\n- Open-WebUI: memory limit 1536Mi \u2192 1Gi, CPU limit 1 \u2192 500m\n- LiteLLM: memory limit 1536 \u2192 1200Mi\n- ClickHouse: memory limit 2Gi \u2192 1536Mi, CPU limit 1 \u2192 500m\n- n8n + worker: memory limits 1Gi \u2192 512Mi\n- Portainer, Qdrant, Promptfoo, Vito, Chmonitor: all tightened\n- cert-manager: added limits to all 3 components (previously unlimited)\n\n### Security\n- Kubeconfig: `/etc/rancher/k3s/k3s.yaml` mode 640, user copy `$HOME/.kube/config.duet-homelab` mode 600\n- All Makefiles and docs updated to use new KUBECONFIG path\n- Docker daemon stopped, disabled, masked (k3s uses containerd)\n\n### Host cleanup\n- Journal logs vacuumed 876MB \u2192 100MB cap\n- Old kernel 6.8.0-110-generic removed\n- Swap consolidated: removed `/swap.img` (4G), kept `/swapfile2` (11G)\n- Failed systemd units masked: NetworkManager-wait-online, systemd-networkd-wait-online\n\n### Firecrawl fix\n- nuq-worker disabled (CrashLoopBackOff \u2014 missing NUQ cloud config, not needed for homelab)\n- Added `{{- if .Values.nuqWorker.enabled }}` guard to deployment template\n\n## Repo: `~/project/infra` (duyet/infra)\n\n**Why**: baseline for future optimization rounds. Re-run `kubectl top pods -A` to compare.\n**How to apply**: resource tuning is iterative \u2014 always measure actual usage before adjusting.", "project-kb-duyet-net": "kb.duyet.net \u2014 Duyet's public knowledge base, the rendered front-end of this\nshared brain.\n\n- **Old form:** an `apps/kb` app inside [[project-duyet-net]] \u2014 markdown articles\n  with frontmatter (category/tags/links/summary), graph view at `/graph`, machine\n  index at `/llms.txt` + `/llms-full.txt`, raw article at `/k/<slug>.md`.\n- **Now:** that monorepo app is being **replaced by THIS repo** (the shared brain).\n  The site renders the kb (including client-side full-text search, RSS, and sitemap)\n  and also serves `/scripts/bootstrap.sh` for new-device setup.\n\nEmbodies [[feedback-docs-driven-development]]: synthesized, graph-connected,\ngrep-able notes \u2014 the durable form of agent memory, distinct from point-in-time\nsession snapshots. Maintained by [[project-duyetbot]]. The 32 long-form source\narticles seeding this brain came from the old monorepo `apps/kb`.", "project-llm-timeline": "`apps/llm-timeline` ([[project-duyet-net]]) \u2014 timeline of LLM models 1950\u20132026,\n3700+ pre-rendered pages. Reference implementation for the flat/shadcn design\n(PR #1003): all `shadow-*` removed, semantic tokens only, vertical stat-card grids.\n\n**Data** (built into pages at build time, `pnpm run sync`, no runtime API):\n- Curated: ~785 models from Google Sheets, hand-maintained by Duyet (out of\n  scope for [[project-duyetbot]] \u2014 research facts + citations).\n- Epoch AI: ~3156 models (extended range back to 1950).\n- Deduped to ~3937 unique (last sync 2026-03-25).\n\n**Tech:** warm cream palette; `@tanstack/react-virtual` `useWindowVirtualizer`\nfor the scroll; WASM normalizer crate via `initSync` (kept for consistency though\nnot faster \u2014 see [[tech-rust-wasm-prerender]]); badge variants replace\ncolor-lookup functions. Design conventions: [[tech-flat-design-system]].", "project-self-driven-homelab": "# The Self-Driving Homelab\n\nA single-node k3s cluster that largely runs itself. An AI agent named Minh lives inside it, reachable by Telegram, and maintains the infrastructure it depends on.\n\n## The Setup\n\n**Hardware**: One machine \u2014 `duet-ubuntu`, 16 CPU, 13Gi RAM, 457G NVMe. Sitting in a home in Vietnam.\n\n**Stack**: k3s (single-node, containerd), Traefik ingress, Let's Encrypt TLS via Cloudflare DNS-01, GitHub OAuth for auth. 15 services across 14 namespaces. All config versioned in git.\n\n**Services**: n8n (workflows), LiteLLM (LLM proxy), Open WebUI (chat UI), Home Assistant (smart home), ClickHouse (analytics DB), Qdrant (vectors), PeerDB (CDC replication), Firecrawl (web scraping), Portainer, and others. All behind OAuth.\n\nNothing exotic. Standard homelab stuff. The interesting part is *who runs it*.\n\n## Minh \u2014 The Agent That Lives Inside\n\nMinh is an instance of [Hermes](https://github.com/duyet/charts) \u2014 an open-source AI agent framework packaged as a Helm chart. She runs as a pod in the cluster with two containers: the agent itself and a Chromium sidecar for browser automation.\n\n**Reach**: You talk to Minh via Telegram (`@minh_duni_bot`). She speaks Vietnamese by default, switches to English when you write in English. One language per reply.\n\n**Brain**: Backed by `@preset/hermes-agent` through [AnyRouter](https://anyrouter.dev), with fallback to Gemini Flash and Claude Sonnet via OpenRouter. She has persistent memory (SOUL.md + session state on a PVC), so she remembers conversations and learns preferences.\n\n**Tools**: MCP servers give her filesystem access, web fetch, GitHub (official github-mcp-server), n8n workflow management, and browser automation via CDP. She can scrape the web (self-hosted Firecrawl), search (Tavily), read email (Himalaya + Gmail), and manage GitHub repos.\n\n**Personality**: Warm, concise, witty. Evidence over guesses. Honest about uncertainty. Proactive with obvious next steps. Calls the user \"anh Duy\u1ec7t\" and refers to herself as \"em\" \u2014 Vietnamese familiar pronouns.\n\n## The Self-Management Loop\n\nHere's where it gets recursive. Minh has **cluster-admin** RBAC and the IaC repos (`duyet/infra`, `duyet/charts`) are mounted directly into her pod via hostPath. She can:\n\n1. **Read the cluster state** \u2014 `kubectl get pods -A`, `helm list`, check PVCs, view logs\n2. **Edit the infrastructure code** \u2014 modify `values.yaml`, manifests, secrets\n3. **Deploy changes** \u2014 `helm upgrade --install`, `kubectl apply`\n4. **Commit and push** \u2014 git commit with semantic messages, push to GitHub\n5. **Verify** \u2014 check pod health, test HTTP endpoints, confirm data integrity\n6. **Update herself** \u2014 even `helm upgrade hermes` to change her own deployment\n\nThis is the full GitOps loop, but the agent *is* the operator. No ArgoCD. No Flux. Just an LLM with kubectl and a git client.\n\n### Example Workflows\n\n- **\"The site is down\"** \u2192 Minh checks pods, finds a crash, reads logs, identifies the config error, edits values.yaml, runs helm upgrade, verifies pods are Running, commits the fix.\n- **\"Add a new service\"** \u2192 Minh creates the namespace directory, writes values.yaml + secrets template, runs helm install, creates the ingress, tests the endpoint, updates docs.\n- **\"How much disk do we have?\"** \u2192 Zero-token shortcut command, instant response with `df -h` output.\n- **\"Optimize resources\"** \u2192 Minh profiles actual CPU/memory usage across all pods, compares to configured limits, adjusts requests/limits in all values files, deploys everything, verifies health, commits. (This actually happened \u2014 [[project-infra-optimization]])\n\n### Quick Commands\n\nMinh has 9 pre-built zero-token shortcuts for common ops: `k3s-status`, `k3s-nodes`, `top`, `disk`, `mem`, `uptime`, `helm`, `pvc`, `infra-diff`. These bypass the LLM entirely \u2014 instant shell output.\n\n## Security Model\n\nYes, a Telegram-reachable LLM with cluster-admin is a high blast radius. This is intentional for a single-node, single-user homelab. Mitigations:\n\n- **`approvals: smart`** \u2014 Minh asks for confirmation before destructive operations (delete namespace, wipe PVC, `--force`)\n- **Persona guardrails** \u2014 her SOUL.md explicitly forbids destructive commands without confirmation\n- **GitHub App auth** \u2014 uses a short-lived installation token (60min), not a personal token\n- **OAuth everywhere** \u2014 all services behind GitHub OAuth via Traefik forwardAuth\n- **HostPath limitation** \u2014 ties the pod to one node. Acceptable for a homelab; multi-node would need RWX PVC or GitOps\n\n## What I Learned\n\n**Resource tuning is an LLM superpower**. Profiling 40+ pods, comparing actual vs configured resources, and adjusting 14 services in parallel is exactly the kind of tedious, systematic work agents excel at. The optimization pass freed 1.7Gi RAM and 9GB disk in one shot.\n\n**Self-reference is stable**. An agent managing its own deployment sounds like it should break, but in practice it's fine \u2014 Helm handles rolling updates, and the pod finishes its work before the new one takes over.\n\n**HostPath is the real constraint**. The IaC repos being mounted from the host means this pattern is single-node only. For multi-node, you'd need git-clone init containers or a proper GitOps tool.\n\n**Kubernetes is good infrastructure for agents**. RBAC, PVCs, init containers, health probes \u2014 all the K8s primitives that manage the agent also give it a rich environment to work with. The agent doesn't need special tooling; it just needs kubectl and helm.\n\n## Architecture\n\n```\nUser (Telegram)\n    \u2193\nMinh (@minh_duni_bot)\n    \u2193 (LLM: @preset/hermes-agent via AnyRouter)\nHermes Pod (k3s, namespace: hermes-agent)\n    \u251c\u2500\u2500 agent container (hermes-agent)\n    \u2502   \u251c\u2500\u2500 MCP: filesystem, fetch, time, github, n8n\n    \u2502   \u251c\u2500\u2500 kubectl + helm (cluster-admin SA)\n    \u2502   \u251c\u2500\u2500 hostPath: ~/project/infra, ~/project/charts\n    \u2502   \u2514\u2500\u2500 git (GitHub App duyetbot, 60min tokens)\n    \u2514\u2500\u2500 chromium container (CDP :9222)\n         \u2193\n    k3s API \u2192 manages all namespaces\n    GitHub API \u2192 commits IaC changes\n```\n\n## Related\n\n- [[project-infra-optimization]] \u2014 the resource optimization pass Minh performed\n- [[tech-traefik-forwardauth-oauth2-proxy]] \u2014 auth layer protecting all services\n- [[tech-hermes-agent-custom-provider]] \u2014 custom LLM provider registration\n\n## Links\n\n- Hermes chart: [github.com/duyet/charts/hermes-agent](https://github.com/duyet/charts)\n- Infra repo: [github.com/duyet/infra](https://github.com/duyet/infra)\n- Hermes agent framework: [github.com/nicepkg/hermes](https://github.com/nicepkg/hermes)", "reference-duyet-blog": "blog.duyet.net \u2014 Duyet runs it as a **digital garden** (evolving notes, not\npolished essays), drafted in Obsidian.\n\nRecurring themes (by volume):\n- **ClickHouse** (largest): MergeTree/Replacing/Replicated engines, mutations,\n  replication topologies, UDFs, Keeper, monitoring on Kubernetes, cheatsheets.\n- **Rust**: async, building libraries (incl. for Next.js / WASM), language-model\n  from scratch, ownership types (`Rc<T>`, `Saturating<T>`), dependency tooling.\n- **AI agents / LLMs**: a leveled \"build an agent\" portfolio series \u2014 push-frontier\n  AI, self-improving coding agent, personal life-OS agent, enterprise workflow\n  agent \u2014 plus MCP, Ollama, workflow-vs-agents, `duyetbot`.\n- **Data engineering**: Airflow (deferrable operators), DuckDB, OpenDAL.\n- **Tooling & life**: homelab, Obsidian, personal analytics / life-logging.\n\nSee [[user-duyet-web-presence]] for all links.", "reference-duyet-github": "github.com/duyet \u2014 ~100 non-fork repos. Notable ones by area:\n\n- **ClickHouse:** `clickhouse-monitoring` (flagship, ~240\u2605, TanStack Start dashboard\n  at dash.chmonitor.dev; Astro landing/docs \u2014 see [[project-clickhouse-monitor]]),\n  `clickhouse-udf-rs` (Rust UDFs).\n- **Rust data/infra tooling (GitOps style):** `grant-rs` (Redshift/Postgres\n  privileges), `athena-rs` (AWS Athena schema), `glossary-rs` (actix API),\n  `cov-rs` (coverage).\n- **AI agents:** `duyetbot-agent` (TS), `coding-agent-insights` (Rust, analyzes\n  coding-agent history), `ccr` (Rust, Claude Code + OpenRouter), `codex-claude-plugins`\n  (Python), `okie.one` (Next.js all-in-one chat assistant).\n- **Infra:** `charts` (Helm charts, tested with KinD), `gaxy` (Go GA/GTM proxy).\n- **Web/personal:** `monorepo` (blog, cv, \u2026), `api.duyet.net`, `saveto`, `feedback`.\n- **Most-starred (older):** `bruteforce-database` (~1.7k\u2605), `pricetrack` (~140\u2605).\n\nLanguages skew Rust + TypeScript + Python. See [[user-duyet-stack]].", "tech-release-please-squash-pipeline": "Pattern used in chmonitor (clickhouse-monitoring) to fully automate releases.\n\n- **release-please** watches `main`, keeps a standing `chore(main): release X.Y.Z`\n  PR + tracked `CHANGELOG.md`. Merging it tags + publishes a GitHub Release,\n  which fires a separate `release.yml` (on `release: published`, NOT tag push \u2014\n  avoids duplicate runs) to build Docker/assets and generate AI release notes.\n- Config/manifest can live anywhere \u2014 pass `config-file` / `manifest-file` to\n  the action. Moving them out of repo root into `.github/` keeps root clean.\n\n**Pre-1.0 bump trap:** with `bump-patch-for-minor-pre-major: true`, in `0.x`\na plain `feat` only bumps the **patch**. To cut a new **minor** (e.g. 0.2\u21920.3)\nthe commit MUST be a breaking change (`feat!:` or `BREAKING CHANGE:` footer).\n\n**The key guard:** squash-merge makes the **PR title** the commit release-please\nreads. An invalid title is silently dropped from the bump + changelog. So add a\n`pr-title` workflow that validates the title against the SAME\n`commitlint.config.js` the husky hook uses (`echo \"$PR_TITLE\" | bunx commitlint`)\n\u2014 one source of truth, no third-party action.\n\n**CHANGELOG ownership:** release-please owns versioned blocks; keep a human\n`## [Unreleased]` section on top for a curated preview \u2014 it's left untouched and\nthe generated block is inserted above it on release.\n\n**AI migration prompt:** ship a paste-able env-migration prompt\n(`.github/release-migration-prompt.md`) auto-appended to breaking releases and\nmirrored in README + docs \u2014 lets users hand their `.env`/compose/k8s to any LLM\nto upgrade.", "tech-supply-chain-pin-github-actions": "GitHub Actions run with the repo's secrets, so a compromised action = a breach.\nTreat every `uses:` as untrusted third-party code that executes in your CI.\n\n## The incident\n\nIn **March 2026**, `aquasecurity/trivy-action` had **75 tags force-pushed** \u2014 a\nknown supply-chain attack pattern where a benign tag is silently moved to a\nmalicious commit. Anyone referencing `@v0.x` (a moving tag) pulled the attacker's\ncode on the next run. (`@v0.36.0` was the pin used here.)\n\n## How to apply\n\n- **Pin every Action** to a specific version tag (`@v0.36.0`, not `@v0.x`) or,\n  better, a **commit SHA** (`@<sha>#semver:`). Tags can be force-pushed; SHAs\n  can't (without repo history rewrite). Dependabot keeps SHA pins fresh.\n- **Two-phase Trivy scan** (report, then fail) \u2014 avoids re-running the expensive\n  setup and separates \"show me the vulns\" from \"gate the build on them\":\n  1. **Report job** \u2014 `trivy-action` with `exit-code: 0` (always succeeds, emits\n     the SARIF/JSON report).\n  2. **Fail-on-severity job** \u2014 `trivy-action` with `skip-setup: true` (reuses the\n     install) + `exit-code: 1` + `severity: CRITICAL,HIGH`.\n\nRelated pipeline hygiene: see [[tech-release-please-squash-pipeline]] and\n[[tech-codebase-maintenance-loop]].", "tech-cloudflare-ai-gateway-proxy": "Cloudflare AI Gateway keeps **no per-model allow-list**. It never rejects a\nrequest because a model is \"unsupported\" by Cloudflare \u2014 it only resolves which\n**upstream/provider** to route to and forwards the model string unchanged. So you\ncan serve a brand-new model the moment the **upstream provider** hosts it; no\nwaiting on Cloudflare.\n\n- **Custom & per-provider endpoints** (`.../<gateway>/custom-{slug}/...`): the\n  model is never parsed \u2014 everything after `custom-{slug}/` is appended to the\n  registered `base_url` and forwarded verbatim. Creating a custom provider needs\n  only `name`/`slug`/`base_url` \u2014 no model registration.\n- **Universal / `compat` endpoint** (`model: \"provider/model\"`): AI Gateway parses\n  only the **provider prefix** to pick a route. The error `\"X is not a valid model\n  ID\"` here means an **unknown provider prefix**, never an unsupported model.\n- A `\"... is not a valid model ID\"` in the AIG dashboard is the **upstream's**\n  rejection (the model isn't hosted there), not AI Gateway's. Debug upstream\n  availability, not gateway config.\n\n**Proven:** routing `nvidia/cosmos3-nano-reasoner` through a custom NVIDIA provider\nreached `integrate.api.nvidia.com` and NVIDIA rejected it (model is self-host\nNIM/HF-weights only, not on the hosted API). AIG passed it through fine.", "tech-cloudflare-pages-deploy": "Each [[project-duyet-net]] app deploys to Cloudflare Pages\n(`scripts/cf-deploy-prod.sh`, per-app `pnpm run cf:deploy:prod`,\n`pages_build_output_dir = \"dist/client\"`).\n\n**Per-task convention:** semantic commit \u2192 push to `master` \u2192 background-deploy\nthe changed app, then continue; verify production (`curl` \u2192 200) after the\ncompletion notification.\n\n**Hazard:** never run two background deploys in parallel \u2014 the script renames\n`.env.local` \u2192 `.env.local.deploy-bak` mid-run, so parallel runs collide and lose\nthe CF API token.\n\n**CI (`cf-deploy.yml`):** matrix over apps on push to `master`; the blog entry\nadds rust-toolchain + wasm-pack + `wasm:build:release` before build (see\n[[tech-rust-wasm-prerender]]); other apps skip it.\n\n**commitlint:** `subject-case` lowercase, `body-max-line-length` 100. Pre-commit\nhook runs `pnpm run test`. Root checks before completing a multi-file task:\n`pnpm run lint` (Biome) + `pnpm run check-types` + `pnpm run test`. Aligns with\n[[feedback-working-style]]; run autonomously by [[project-duyetbot]].", "tech-traefik-forwardauth-oauth2-proxy": "Pattern for protecting k8s services behind GitHub OAuth2 via Traefik forwardAuth.\n\n## Architecture\n\n```\nRequest \u2192 Traefik IngressRoute\n  \u2192 forwardAuth middleware (points to auth-redirector:9190/auth)\n    \u2192 auth-redirector (nginx) proxies to oauth2-proxy:4180/oauth2/auth\n      \u2192 200: pass through (authenticated)\n      \u2192 401: nginx intercepts \u2192 302 to oauth2-proxy login\n```\n\n## Key insight: why nginx redirector is needed\n\nTraefik's `ErrorPages` middleware replaces the response body but **keeps the original status code**. When oauth2-proxy returns 302 on unauthenticated requests, ErrorPages rewrites it \u2014 the redirect never reaches the browser. The nginx redirector intercepts the 401 from oauth2-proxy and returns its own 302 with the correct `Location` header. This is a known Traefik limitation, not a bug.\n\n## OAuth2 Proxy callback URL\n\nMust use the proxy prefix path `/oauth2/callback`, not `/callback`:\n\n```\nredirect-url: \"https://auth.example.com/oauth2/callback\"\nlogin URL:     \"https://auth.example.com/oauth2/start?rd=<original-url>\"\n```\n\n## Traefik Middleware config\n\n```yaml\napiVersion: traefik.io/v1alpha1\nkind: Middleware\nspec:\n  forwardAuth:\n    address: http://auth-redirector.<ns>.svc.cluster.local:9190/auth\n    authResponseHeaders:\n      - X-Auth-Request-Email\n      - X-Auth-Request-User\n    trustForwardHeader: true\n```\n\nApply to IngressRoute via `middlewares` annotation or CRD middleware chain.", "tech-ai-agent-stack": "The 2026 stack for building LLM agents, by layer:\n\n- **Orchestration (Python):** LangGraph (graph/state machines), LlamaIndex\n  (RAG + agents), PydanticAI, CrewAI, AutoGen, OpenAI Agents SDK, Google ADK.\n- **Orchestration (TS/JS):** Vercel **AI SDK** (streaming, tools, `ToolLoopAgent`),\n  Mastra, LangGraph.js, Cloudflare Agents (Durable Objects), OpenAI Agents SDK,\n  Claude Agent SDK.\n- **Model gateways:** OpenRouter, AnyRouter, LiteLLM \u2014 swap providers without code churn.\n- **Interop protocol:** **MCP** (Model Context Protocol) for tools/resources; A2A\n  for agent-to-agent.\n- **Memory / RAG:** vector stores (Qdrant, pgvector), LlamaIndex; explicit\n  short/long-term + reflection memory for agentic loops.\n- **Eval / observability:** LangSmith, Langfuse, Braintrust.\n- **Runtime / deploy:** Cloudflare Workers + Durable Objects, Vercel.\n\n**Duyet uses** (see [[user-duyet-ai-stance]]): Claude Code as driver; Claude Agent\nSDK, OpenAI Agents SDK, Cloudflare Agents, Vercel AI SDK, LlamaIndex, LangChain;\nOpenRouter/AnyRouter for routing; MCP (mcp.duyet.net). Core pattern: plan \u2192\nexecute \u2192 test \u2192 reflect with persistent memory.", "tech-hermes-agent-custom-provider": "Hermes agent configuration for custom OpenAI-compatible LLM providers.\n\n## Custom provider registration\n\nTwo-part config in `hermes.yaml`:\n\n1. **`custom_providers` list** \u2014 registers the provider by name, base_url, model, and api_key\n2. **`model.provider: custom`** \u2014 tells Hermes to look up from custom_providers instead of built-in\n\n```yaml\nmodel:\n  api_key: ${API_KEY}\n  base_url: ${API_BASE}\n  default: 'provider-name/model-name'\n  provider: custom          # <-- required to use custom_providers\ncustom_providers:\n  - api_key: ${API_KEY}\n    base_url: https://example.com/api/v1\n    model: actual-model-id\n    name: provider-name     # referenced in default as \"provider-name/model\"\nproviders: {}               # clear built-in providers if not needed\n```\n\n**Gotcha:** `providers` must be set to `{}` if you don't want built-in providers loaded. Leaving it out may cause conflicts.\n\n## Steer mode (busy_input_mode)\n\n```yaml\ndisplay:\n  busy_input_mode: steer\n  busy_ack_enabled: true\n```\n\n- `steer`: when the agent is busy processing, new user messages are queued and the agent adjusts its current task to incorporate them (rather than ignoring or queuing blindly)\n- `busy_ack_enabled: true`: sends a brief acknowledgment so the user knows the message was received\n- Alternative values: `reject`, `queue` (agent-specific)", "tech-okf-open-knowledge-format": "**Open Knowledge Format (OKF) v0.1** \u2014 Draft. Published by Google Cloud (Sam\nMcVeety, Amir Hormati) 2026-06-13. Canonical spec: `GoogleCloudPlatform/knowledge-catalog/okf/SPEC.md`.\n\nAn open, vendor-neutral standard for the **markdown + YAML-frontmatter\n\"LLM-wiki\"** pattern \u2014 the same pattern [[feedback-docs-driven-development]] and\nthis repo already use. \"Just markdown, just files, just YAML frontmatter.\" No\nruntime, no SDK, no compression.\n\n## Shape\n\n- **Bundle** = a directory tree of `.md` files. **Concept** = one `.md` file.\n  **Concept ID** = the file path with `.md` removed (the *path is the identity*).\n- **Reserved filenames** (MUST NOT be concepts): `index.md` (directory listing\n  for progressive disclosure), `log.md` (chronological change history, newest\n  first, ISO 8601).\n- Concepts link via **standard markdown links** (bundle-relative `/x.md` or\n  relative `x.md`) \u2192 a graph richer than the folder hierarchy. Consumers MUST\n  tolerate broken links.\n- **Frontmatter \u2014 REQUIRED: only `type`** (free-form string, not centrally\n  registered; e.g. `BigQuery Table`, `Metric`, `Playbook`, `Reference`).\n  Recommended: `title`, `description`, `resource` (URI of the asset), `tags`,\n  `timestamp` (ISO 8601). Producers MAY add custom keys; **consumers MUST\n  preserve unknown fields** and tolerate unknown `type`s.\n- Conventional body headings: `# Schema`, `# Examples`, `# Citations`.\n\n## Three design principles\n\n1. **Minimally opinionated** \u2014 only `type` is mandated; spec defines the\n   *interoperability surface*, not the content model.\n2. **Producer/consumer independence** \u2014 the format is the contract; tooling at\n   each end is swappable (human-authored \u2194 agent-consumed).\n3. **Format, not platform** \u2014 no cloud / DB / model / agent-framework lock-in.\n\n## Gotcha: the reference validator is stricter than the prose\n\nThe prose requires only `type`, but Google's reference `OKFDocument.validate()`\nrejects any doc missing **`type`, `title`, `description`, `timestamp`** (all four,\nnon-empty), and Google's own sample bundles (GA4, Stack Overflow, Bitcoin) carry\nall four. So *de facto* OKF = those 4 fields. Reference tooling: a BigQuery\nenrichment agent (producer) + a self-contained static HTML graph visualizer\n(consumer).\n\n## How this repo aligns\n\nThis repo **is** a strict-conformant OKF v0.1 bundle. `memory/` is the bundle\nroot; each concept is one `.md` carrying the required `type`. Field map:\n\n| OKF field | this repo | status |\n|-----------|-----------|--------|\n| `type` | `type` (user/feedback/project/reference/tech) | \u2705 |\n| `title` / `description` | same | \u2705 |\n| `tags` | `tags` | \u2705 |\n| `resource` | `sources` (URL array vs singular URI) | \u2248 |\n| `timestamp` | `timestamp` (ISO 8601) + `created`/`updated` (dates) | \u2705 |\n| path = ID | `name:` field (= filename) \u2014 permitted custom key | \u2705 |\n| `index.md` | `memory/index.md` (generated) + `MEMORY.md` (root index) | \u2705 |\n| `log.md` | `memory/log.md` (change history, newest-first) | \u2705 |\n\nConcepts are grouped into **nested topic dirs** by domain\n(`topics/cloudflare/`, `topics/llm-agents/`, `topics/web/`, `topics/ci/`, \u2026)\nalongside the memory-layer dirs (`user/`, `feedback/`, `reference/`,\n`projects/`). Cross-links use Obsidian wikilinks (the double-bracket form) \u2014 an\nOKF-compatible producer convention; the structured graph also rides in `related:`\nfrontmatter. The official validator treats non-`/path.md` text as plain prose, so\nthis is conformant with zero warnings. The monorepo `apps/kb` app is a live\n**consumer** \u2014 see [[project-kb-duyet-net]]; `kb viz` renders a self-contained\ngraph viewer (the OKF reference consumer pattern).", "tech-flat-design-system": "Flat editorial visual language across [[project-duyet-net]] (xAI-style reference,\nset 2026-05-25). [[project-llm-timeline]] PR #1003 is the reference implementation.\n\n**Flat rules:** hairline 1px border (`var(--hairline)`) is the only elevation cue.\nNo `shadow-*`, no glow, no `rounded-2xl` (use `rounded-none`/`rounded-md`). Hover\n= background tint (`var(--faint)`), not shadow. Divider grid: `gap-px\nbg-[var(--hairline)]` container with `bg-[var(--background)]` cells.\n\n**Tokens (3 additive CSS layers in `packages/components/styles.css`):** base\n(Tailwind v4 `@theme`) \u2192 warm (`#fbf7f0 / #1f1f1f`) \u2192 minimal (`--minimal-*` +\nutilities `.pill-outline`, `.eyebrow-mono`, `.display-tight`). shadcn primitives\n(badge/button/input/card, CVA + radix slot) use semantic tokens (`bg-card`,\n`text-foreground`, `border-border`) \u2014 zero hardcoded `neutral-*`/`dark:`.\n\n**Icons:** `lucide-react` everywhere (drop `weight` prop); migrate\n`@phosphor-icons/react` when touching a file. **Dark mode:** card tints\n`dark:bg-{color}/20`; badges invert shade pair; blog uses white `#ffffff` bg\n(distinct editorial identity) over the warm cream others use.", "tech-kumo-ui-nextjs-integration": "Hard-won facts from migrating the AgentState dashboard (Next 16 + Turbopack + `output:\"export\"`) to `@cloudflare/kumo@2.5` from shadcn/ui. See [[project-agentstate-kumo-rebuild]].\n\n**`createContext is not a function` is THE blocker.** Kumo (base-ui) AND `@phosphor-icons/react` (`IconContext`) call `React.createContext` at module top-level. RSC pre-render has no `createContext`, so **every file importing either must start with `\"use client\"`** \u2014 not just the obvious ones. `transpilePackages: [\"@cloudflare/kumo\",\"@base-ui/react\",\"@phosphor-icons/react\",\"echarts\"]` is necessary but NOT sufficient.\n\n**Tailwind v4 wiring** (`globals.css`): `@source \"../../node_modules/@cloudflare/kumo/dist/**/*.{js,jsx,ts,tsx}\";` then `@import \"@cloudflare/kumo/styles/tailwind\";` BEFORE `@import \"tailwindcss\";`. Without `@source`, Kumo utility classes silently vanish (e.g. dialogs not centered).\n\n**API differences vs shadcn:**\n- `Button` has **no `render`/`asChild`** \u2192 link buttons are `<Link href><Button>\u2026</Button></Link>`. Default `variant` is `secondary` (map shadcn `default`\u2192`primary`).\n- `Tabs` is **array-based** (`tabs={[{value,label}]}` + controlled `value`/`onValueChange`), no `Tabs.Content`.\n- **No `Chart`** \u2192 use `echarts` directly (it's a peer dep).\n- `Sidebar`: use named `SidebarProvider` (not `Sidebar.Provider`); `SidebarMenuButton` has `href`+`active`+`tooltip` but **no `render`**.\n- `Text` is a discriminated union: `heading1/2/3` REQUIRE matching `as=\"h1/2/3\"`; **`className` is not accepted** on `Text` at all.\n\n**Tokens:** Kumo ships `--color-kumo-*` (base, hairline, fill, danger, brand\u2026) AND the standard names (`muted`, `foreground`, `border`\u2026) resolve from your own `globals.css :root`. Don't invent `kumo-line`/`kumo-tint`/`kumo-subtle`/`kumo-strong` \u2014 they don't exist; only `kumo-base` does among the common ones.\n\n**Phosphor:** `Activity` does NOT exist (use `Pulse`/`ChartLine`); both bare (`House`) and `*Icon` (`HouseIcon`) forms export. `lucide\u2192phosphor`: Home\u2192House, Settings\u2192Gear, MessageSquare\u2192ChatCircle, ChevronsUpDown\u2192CaretUpDown, Building2\u2192Buildings.\n\n**Dark mode:** Kumo uses `data-mode=\"dark\"` attr; shadcn uses `.dark` class. During migration set BOTH. Local docs via `bunx kumo doc <Name>` / `kumo ls` (web docs often rate-limited).\n\n**Install:** `bun add @cloudflare/kumo @phosphor-icons/react echarts zod` (project uses Bun, not pnpm).", "tech-og-images-static-prerender": "**Goal:** unique 1200\u00d7630 social-share images per page on a static site, without\nadding a runtime image renderer.\n\n**Two flavours of \"dynamic\":**\n- *Build-time* \u2014 generate one committed `og-<slug>.png` per page; regenerate on\n  every deploy. No worker bundle cost. **Default choice** for static-first apps.\n- *Request-time* \u2014 a `/og?title=\u2026` worker route rendering live (Satori + resvg\n  WASM). Truly dynamic but adds WASM weight to the worker bundle; avoid unless\n  needed.\n\n**Pipeline (build-time):** [Satori](https://github.com/vercel/satori) (HTML/CSS\nobject tree \u2192 SVG) + `@resvg/resvg-js` (SVG \u2192 PNG). Make it **hermetic**: vendor\nthe TTF fonts in-repo so no network access \u2014 safe inside CI deploy jobs. It's\ndeterministic (no timestamps/random), so regenerating unchanged cards yields\n**byte-identical** PNGs \u2014 git diff = objective proof a refactor changed nothing.\n\n**Single registry = no drift.** One map `slug \u2192 {eyebrow, title, description}`\nfeeds *both* consumers: (1) the generator loops it to emit `og-<slug>.png`, and\n(2) a `pageOgHead(slug)` helper builds the route `<head>` meta. A standalone bun\nscript can import the app's TS registry directly \u2014 keep that file free of React /\npath-alias imports.\n\n**Crawler correctness \u2014 the check that matters:** social crawlers (Slack, X,\nFacebook) don't run JS. The OG meta MUST be in the *prerendered* HTML, not\ninjected client-side. With TanStack Start SSG the route `head()` runs at build\nand bakes tags into `dist/client/<route>/index.html`. Verify by grepping the\nbuilt HTML, and on prod check the image returns `200 image/png` with\n`cf-cache-status: MISS` right after deploy (proves fresh, not edge-cached).\n\nRoot layout holds the shared defaults (`og:type`, `og:image:width/height`,\n`twitter:card=summary_large_image`); per-route `head()` overrides title + image.\nPages without a registry entry fall back to the site-wide default image.\n\nShipped in chmonitor [[project-clickhouse-monitor]] (PRs #1614/#1615 base,\n#1617 extended to per-page query pages).", "tech-rust-wasm-prerender": "7 Rust crates compiled to WASM (`crate-type=[\"cdylib\"]`) replace TS in\n`@duyet/libs` ([[project-duyet-net]]). Apps import `@duyet/libs/*`, never WASM directly.\n\n**Migration rule:** only migrate a TS function to WASM if its TS mean > ~1 ms.\nJS\u2194WASM string marshaling costs ~30\u201340 \u00b5s/call, so sub-100 \u00b5s ops are parity or\nslower. Only `markdown-to-html` cleared it: 6.3 ms \u2192 0.08 ms (~79x). Slower\ncrates (normalizers, dedup, csv, exif, diff, string-utils) kept for consistency\n+ future batch APIs that amortize marshal cost.\n\n**CI trap:** `**/pkg/` is gitignored \u2192 WASM must be built in CI before the build\nstep. With `prerender.failOnError:false`, a missing binary makes `markdownToHtml`\nthrow, the route is silently skipped, no `index.html` written, and CF Pages\nserves the homepage at every post URL (looks like a routing bug; deploy logs green).\n**Fix:** CI runs rust-toolchain + wasm-pack + `wasm:build:release` before build,\ngated on the blog app. **Diagnose:** healthy blog build = 700+ `index.html` in\n`dist/client/`; grep build log for `markdownToHtml`/\"Failed to convert\".\nSee [[tech-tanstack-start-ssg]], [[tech-cloudflare-pages-deploy]].", "tech-tanstack-stale-route-chunks": "Post-deploy, users on an old main bundle may 404 a lazy route chunk (`pricing-*.js`). TanStack Router then throws **`Cannot read properties of undefined (reading 'component')`** \u2014 not caught by import-only preload handlers.\n\n## Fix pattern (AnyRouter 2026-06-14)\n\n1. Inline pre-import script: match import failures **and** router render errors; `sessionStorage` debounce (30s); listen `unhandledrejection`, `error`, `vite:preloadError`\n2. Root `errorComponent` calls same reload helper when patterns match\n3. Prerender public marketing routes so ASSETS HTML is hash-locked with current build (`<slug>.html`, not `index.html` \u2014 CF trailing-slash 307 trap)\n\n**Why:** Default TanStack error UI sticks; users blame the page, not their cached bundle.\n\n**How to apply:** On any TanStack Start + Vite code-split app with frequent deploys, extend stale-chunk recovery beyond dynamic-import strings; prerender high-traffic static shells in the two-deploy capture pass.", "tech-tanstack-start-ssg": "**Problem:** Cloudflare Rocket Loader rewrites `<script type=\"module\">` to a\ndeferred non-module script \u2192 Vite SPA entry never bootstraps \u2192 blank page.\n**Fix:** pre-render HTML so content exists before JS runs. (Also disable Rocket\nLoader per domain in the CF dashboard as belt-and-suspenders.)\n\n**Migrate Vite SPA \u2192 TanStack Start SSG** (~8 files/app):\n- `vite.config.ts`: swap `TanStackRouterVite()` for `tanstackStart({ prerender:\n  { enabled: true, crawlLinks: true, failOnError: false } })`; drop\n  `@vitejs/plugin-react`; do NOT pass `autoCodeSplitting` (not in schema).\n- Delete `index.html` + `main.tsx`; add `entry-client.tsx` (`hydrateRoot`),\n  `entry-server.tsx` (`createStartHandler`).\n- `router.tsx` must export a `getRouter()` factory, not a const.\n- `__root.tsx` renders full `<html>` doc; move `<meta>`/`<link>` into route `head()`.\n- Build output `dist` \u2192 `dist/client`; set `pages_build_output_dir` in `wrangler.toml`.\n\n**Gotchas:** paths in config are relative to `srcDirectory` (`src`); local\n`fetch('/data.json')` fails in SSR \u2014 use isomorphic loading (`fs.readFile` on\nSSR, `fetch()` on client); absolute API URLs work in both. `failOnError:false`\nhides prerender errors \u2014 see [[tech-rust-wasm-prerender]]. Deploy: [[tech-cloudflare-pages-deploy]].", "tech-codebase-maintenance-loop": "How [[project-duyetbot]] keeps [[project-duyet-net]] low-debt \u2014 extends\n[[feedback-working-style]] with concrete tooling.\n\n**Improvement cycles:** periodic scoped sweeps, one debt category each (security,\ndedup/shadcn, privacy/cache, data-sync, DB, design, tests). ~9 cycles / ~155\nfixes by early 2026; cycle 9 added 104 tests + unified the design system. Run a\ncycle: `git log --since=<date> --name-only` to scope \u2192 fix \u2192 test before/after \u2192\none semantic commit per logical change.\n\n**Safe dead-code removal:** before deleting a symbol, prove zero non-test refs:\n`rg -n \"<symbol>\" apps packages --glob '!**/*.test.*' --glob '!**/*.spec.*'`.\nEmpty output = safe. `pnpm why <pkg>` to check dep overrides. Record durable\nfindings in the core-memory doc \u2014 do NOT create dated review files.\n\n**Tests:** `pnpm run test` from root (also the pre-commit hook). A test must fail\nwhen business logic changes (encode WHY, not just WHAT). Priority by risk:\nsecurity/credentials \u2192 data transforms (normalizers, slugs, markdown) \u2192 render\ncorrectness \u2192 edge cases.", "user-duyet-ai-stance": "Duyet's current AI practice (from his blog, ~2026):\n\n- **Vibe-codes for production.** Top Wakatime language is now **Markdown** \u2014\n  he drives agents more than he hand-writes code.\n- **Claude Code is his daily driver** and stated favorite (\"king\") after trying\n  100+ tools (Cursor, Codex, Copilot, Windsurf, Antigravity, opencode, etc.). He\n  treats specific tools as disposable \u2014 the field moves too fast to pick \"the best\".\n- **Builds with agent SDKs:** OpenAI Agents SDK, Claude Agent SDK, Cloudflare\n  Agents, Vercel AI SDK, LlamaIndex, LangChain. Deploys RAG for enterprise.\n- **Recurring interests:** self-improving/agentic loops (plan\u2192execute\u2192test\u2192reflect),\n  agent memory & consolidation, privacy-first personal agents, personal analytics\n  / life-logging. Personal agent project: `duyetbot`.\n\nSee [[user-duyet-stack]] for the broader toolset.", "user-duyet-profile": "**Duyet Le** (handle `@duyet`) \u2014 senior data engineer and technology enthusiast,\nbased in Vietnam. Owner of this knowledge base.\n\nFocus areas: large-scale data platforms, real-time analytics, ClickHouse, the\ndata-engineering ecosystem (Kafka, Spark, Airflow), Kubernetes/cloud infra, and\nLLM agents / AI integration. Active open-source contributor.\n\nPublic links and stack live in [[user-duyet-web-presence]] and [[user-duyet-stack]].\nWorking preferences in [[feedback-working-style]].", "user-duyet-stack": "Technical stack for [[user-duyet-profile]], drawn from public blog & GitHub.\n\n**Languages:** Rust (extensive), Python, TypeScript/JavaScript, SQL. Also R, PHP\nin older posts. Notably interested in data-engineering tools written in Rust.\n\n**Data & big data:** ClickHouse (deep expertise), Apache Spark, Apache Airflow,\nDuckDB, Kafka; PostgreSQL, MongoDB, Redis.\n\n**Cloud & infra:** Kubernetes, Docker, AWS, GCP, Azure, Cloudflare, GitHub Actions.\n\n**AI/ML:** LLM agents & coding agents (Claude, Codex, Hermes), PyTorch/TensorFlow,\nNLP, MCP servers.\n\n**Frontend/web:** Next.js, React, TypeScript (e.g. `clickhouse-monitoring`).\n\n**Local dev environment:** macOS (Apple Silicon), Homebrew, `bun`, `uv`, neovim,\nObsidian. Prefers semantic commits and simple, plain English in writing.\n\nBlog series worth knowing: ClickHouse on Kubernetes, Rust Fundamentals, Spark on\nKubernetes, Apache Airflow, Coding Agents. See [[user-duyet-web-presence]].", "user-duyet-web-presence": "Public web presence for [[user-duyet-profile]]. Sites ending in `/llms.txt`\nserve an LLM-friendly profile \u2014 prefer those for fresh facts.\n\n| What        | URL                          | llms.txt                         |\n|-------------|------------------------------|----------------------------------|\n| Profile     | https://duyet.net            | https://duyet.net/llms.txt       |\n| Blog        | https://blog.duyet.net       | https://blog.duyet.net/llms.txt  |\n| CV / Resume | https://cv.duyet.net         | https://cv.duyet.net/llms.txt    |\n| GitHub      | https://github.com/duyet     | \u2014                                |\n| LinkedIn    | https://duyet.net/in         | \u2014                                |\n| X (Twitter) | https://x.com/_duyet          | \u2014                                |\n| Insights    | https://insights.duyet.net   | \u2014                                |\n| Homelab     | https://homelab.duyet.net    | \u2014                                |\n| LLM Timeline| https://llm-timeline.duyet.net | \u2014                              |\n| MCP tools   | https://mcp.duyet.net        | \u2014                                |\n| Agents API  | https://agents.duyet.net     | \u2014                                |\n\nContact: `me@duyet.net`. Blog feed: https://blog.duyet.net/feed."}, "types": ["feedback", "project", "reference", "tech", "user"], "palette": {"feedback": "#ec4899", "project": "#3b82f6", "reference": "#10b981", "tech": "#f59e0b", "user": "#8b5cf6"}};
(function(){
  const b=window.BUNDLE, byId={}; b.nodes.forEach(n=>byId[n.data.id]=n.data);
  const back={}; b.edges.forEach(e=>{(back[e.data.target]=back[e.data.target]||[]).push(e.data.source)});
  const leg=document.getElementById("legend");
  b.types.forEach(t=>{const s=document.createElement("span");s.innerHTML='<i style="background:'+b.palette[t]+'"></i>'+t;leg.appendChild(s)});
  const cy=cytoscape({container:document.getElementById("graph"),elements:[...b.nodes,...b.edges],style:[
    {selector:"node",style:{"label":"data(label)","background-color":"data(color)","width":"data(size)","height":"data(size)","color":"#334155","font-size":10,"text-valign":"bottom","text-margin-y":4,"text-wrap":"wrap","text-max-width":80}},
    {selector:"node:selected",style:{"border-width":3,"border-color":"#0f172a"}},
    {selector:"edge",style:{"width":1,"line-color":"#cbd5e1","curve-style":"bezier","opacity":.55}}
  ],layout:{name:"cose",animate:false,idealEdgeLength:90,nodeRepulsion:9000,padding:20}});
  function select(id){
    cy.nodes().unselect(); const el=cy.getElementById(id); if(el&&el.length)el.select();
    const n=byId[id]; if(!n) return;
    const bodyMd=b.bodies[id]||"";
    const tags=(n.tags||[]).map(t=>'<span>'+t+'</span>').join("");
    const bl=(back[id]||[]).map(s=>'<li><a data-id="'+s+'">'+((byId[s]||{}).label||s)+'</a></li>').join("");
    document.getElementById("detail").innerHTML=
      '<h1>'+n.label+'</h1>'+
      '<span class="badge" style="background:'+(b.palette[n.type]||'#64748b')+'">'+n.type+'</span>'+
      (n.resource?' <a class="muted" href="'+n.resource+'" target="_blank" rel="noopener">source ↗</a>':'')+
      '<p class="desc">'+(n.description||'')+'</p>'+
      (tags?'<div class="tags">'+tags+'</div>':'')+
      '<div class="body">'+marked.parse(bodyMd)+'</div>'+
      (bl?'<div id="backlinks"><h2>Linked from</h2><ul>'+bl+'</ul></div>':'');
    document.querySelectorAll('#backlinks a').forEach(a=>a.onclick=()=>select(a.dataset.id));
  }
  cy.on("tap","node",e=>select(e.target.id()));
  if(b.nodes.length) select(b.nodes[0].data.id);
})();
</script>
