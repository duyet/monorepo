name = "duyet-agents"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist/client"

[vars]
# Server-side pepper for hashing IPs before storage. Override in dashboard for production.
RATE_LIMIT_PEPPER = "change-me-in-production"
# Cloudflare AI Gateway used by Workers AI requests.
CF_AIG_GATEWAY_ID = "monorepo"

[[d1_databases]]
binding = "DB"
database_name = "duyet-agents-db"
database_id = "6d29934e-92cc-48ff-9149-8ddf6846fd43"
