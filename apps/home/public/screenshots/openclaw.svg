  <!-- Row 1 -->
  <rect x="20" y="222" width="760" height="36" rx="6" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="42" cy="240" r="6" fill="#10b981"/>
  <text x="58" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#e5e5e5">blog.duyet.net</text>
  <text x="200" y="244" font-family="system-ui,sans-serif" font-size="9" fill="#555">Next.js</text>
  <text x="660" y="244" font-family="system-ui,sans-serif" font-size="9" fill="#10b981" text-anchor="end">● Operational</text>
  <text x="760" y="244" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">2m ago</text>

  <!-- Row 2 -->
  <rect x="20" y="264" width="760" height="36" rx="6" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="42" cy="282" r="6" fill="#10b981"/>
  <text x="58" y="286" font-family="system-ui,sans-serif" font-size="11" fill="#e5e5e5">insights.duyet.net</text>
  <text x="200" y="286" font-family="system-ui,sans-serif" font-size="9" fill="#555">Next.js</text>
  <text x="660" y="286" font-family="system-ui,sans-serif" font-size="9" fill="#10b981" text-anchor="end">● Operational</text>
  <text x="760" y="286" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">5m ago</text>

  <!-- Row 3 -->
  <rect x="20" y="306" width="760" height="36" rx="6" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="42" cy="324" r="6" fill="#10b981"/>
  <text x="58" y="328" font-family="system-ui,sans-serif" font-size="11" fill="#e5e5e5">agents.duyet.net</text>
  <text x="200" y="328" font-family="system-ui,sans-serif" font-size="9" fill="#555">Workers</text>
  <text x="660" y="328" font-family="system-ui,sans-serif" font-size="9" fill="#10b981" text-anchor="end">● Operational</text>
  <text x="760" y="328" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">1m ago</text>

  <!-- Row 4 -->
  <rect x="20" y="348" width="760" height="36" rx="6" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="42" cy="366" r="6" fill="#f59e0b"/>
  <text x="58" y="370" font-family="system-ui,sans-serif" font-size="11" fill="#e5e5e5">homelab.duyet.net</text>
  <text x="200" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#555">Docker</text>
  <text x="660" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b" text-anchor="end">⚠ Degraded</text>
  <text x="760" y="370" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">12m ago</text>

  <!-- Row 5 -->
  <rect x="20" y="390" width="760" height="36" rx="6" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="42" cy="408" r="6" fill="#10b981"/>
  <text x="58" y="412" font-family="system-ui,sans-serif" font-size="11" fill="#e5e5e5">photos.duyet.net</text>
  <text x="200" y="412" font-family="system-ui,sans-serif" font-size="9" fill="#555">Next.js</text>
  <text x="660" y="412" font-family="system-ui,sans-serif" font-size="9" fill="#10b981" text-anchor="end">● Operational</text>
  <text x="760" y="412" font-family="system-ui,sans-serif" font-size="9" fill="#555" text-anchor="end">3m ago</text>
